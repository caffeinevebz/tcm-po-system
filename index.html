<body>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAcE76Pc46oOJ3FMqb4kcojbvq5ACPuwaE",
            authDomain: "tcm-orders.firebaseapp.com",

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const functions = firebase.functions();

        const DEFAULT_SUPPLIERS = [ { "name": "Rare Beans Company", "phone": "8619122260" }, { "name": "Aditya Industries", "phone": "9595711611" }, { "name": "Renu Devi & Sons", "phone": "7737840411" }, { "name": "Cash Purchase", "phone": "" } ];
        const DEFAULT_INVENTORY = {
            "Fruits and Vegetables": ["Apple (सेव)", "Avocado (अवोकेडो)", "Banana (केले)", "Broccoli (ब्रोकली)", "Tomato (टमाटर)", "Garlic (लहसुन)", "Onion (प्याज़)"],
            "Coffee and Matcha": ["Full House Green (Arabica)", "Baarbara Green (Cold Brew)", "Matcha (Premium)"],
            "Groceries": ["Aata", "Amul Butter", "Amul Cheese", "Sugar", "Milk (Full Cream)", "Olive Oil"],

        };
        const UNITS = ["Kg", "gms", "Piece", "Pkt", "Jar", "Carton", "Tin", "bunch", "Ltr", "ml", "tsp", "tbsp", "Bottle"];
        const RECIPE_CATEGORIES = ["Beverages", "Kitchen", "Desserts", "Batch Prep"]; 

        // --- ICONS ---
        const Icons = {
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
            Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>,
            Camera: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Menu: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>,
            Close: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Activity: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>,
            Box: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>,
            FileText: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        };

        const compressImage = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scaleSize = 1500 / img.width;
                        canvas.width = 1500; canvas.height = img.height * scaleSize;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                    }; img.onerror = reject;
                }; reader.onerror = reject;
            });
        };

        // --- DASHBOARD LAYOUT WRAPPER ---
        const DashboardLayout = ({ role, onLogout, activeTab, setActiveTab, children }) => {
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            
            const staffMenu = [
                { id: 'dashboard', label: 'Dashboard' },
                { id: 'order', label: 'Draft TCM BrewOps Order' },
                { id: 'recipes', label: 'Recipe Book' }
            ];
            const ownerMenu = [
                { id: 'dashboard', label: 'Welcome Dashboard' },
                { id: 'orders', label: 'Manage Orders & POs' },
                { id: 'recipes', label: 'Kitchen Recipe Book' },
                { id: 'conversions', label: 'Prep Kitchen Engine' },
                { id: 'databases', label: 'System Settings & DB' }
            ];
            const menuItems = role === 'owner' ? ownerMenu : staffMenu;

            return (
                <div className="min-h-screen pb-24 lg:pb-0 transition-all duration-700 ease-in-out bg-theme-orders relative">
                    {/* Sidebar Overlay */}
                    {isSidebarOpen && <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 transition-opacity" onClick={() => setSidebarOpen(false)}></div>}
                    
                    {/* Sidebar Drawer */}
                    <div className={`fixed inset-y-0 left-0 w-72 bg-victorian text-paper shadow-2xl z-50 transform transition-transform duration-300 ease-in-out ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="flex justify-between items-center p-6 border-b border-white/10">
                            <div className="flex items-center space-x-3">
                                <div className="flex flex-col"><h1 className="text-xl font-serif font-bold uppercase tracking-wider text-antique">TCM<br/>BrewOps</h1></div>
                            </div>
                            <button onClick={() => setSidebarOpen(false)} className="text-gray-400 hover:text-white"><Icons.Close/></button>
                        </div>
                        <div className="p-4 space-y-2 flex flex-col h-[calc(100vh-100px)]">
                            <div className="flex-1 space-y-2 mt-4">
                                <p className="text-[10px] text-gray-500 uppercase tracking-widest font-bold px-4 mb-4">{role} Navigation</p>
                                {menuItems.map(item => (
                                    <button key={item.id} onClick={() => { setActiveTab(item.id); setSidebarOpen(false); }} className={`w-full text-left px-4 py-3.5 font-bold text-xs uppercase tracking-widest rounded-xl transition-all ${activeTab === item.id ? 'bg-antique text-victorian shadow-md' : 'text-gray-300 hover:bg-white/10 hover:text-white'}`}>
                                        {item.label}
                                    </button>
                                ))}
                            </div>
                            <button onClick={onLogout} className="w-full text-left px-4 py-3.5 font-bold text-xs uppercase tracking-widest rounded-xl text-dangerLight hover:bg-danger/20 transition-all">Log Out</button>
                        </div>
                    </div>

                    <header className="bg-victorian/95 backdrop-blur-xl text-paper p-4 shadow-elegant sticky top-0 z-30 border-b border-antique/30">
                        <div className="flex items-center max-w-6xl mx-auto px-2 lg:px-6 relative">
                            <button onClick={() => setSidebarOpen(true)} className="mr-4 text-antique hover:text-white transition-colors"><Icons.Menu/></button>
                            <div className="flex-1 flex justify-center py-2">
                                <p className="font-serif font-bold text-3xl uppercase tracking-widest text-white drop-shadow-sm flex items-center gap-3">
                                    <Icons.FileText />TCM BrewOps<Icons.Box />
                                </p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto mt-6 px-4 lg:px-6">
                        {children}
                    </main>
                </div>
            );
        };

        function App() {
            const [role, setRole] = useState(null);
            const [loading, setLoading] = useState(true);
            const [staffTab, setStaffTab] = useState('dashboard'); 
            const [ownerTab, setOwnerTab] = useState('dashboard'); 
            
            const [requests, setRequests] = useState([]); const [pos, setPos] = useState([]); const [poCounter, setPoCounter] = useState({ month: '', count: 1 });
            const [suppliers, setSuppliers] = useState([]); const [inventory, setInventory] = useState(DEFAULT_INVENTORY);
            const [prepItems, setPrepItems] = useState([]); const [ownerPhone, setOwnerPhone] = useState('');
            const [recipes, setRecipes] = useState([]); const [prices, setPrices] = useState({}); const [aliases, setAliases] = useState({});
            
            const [toast, setToast] = useState(null); const [confirmDialog, setConfirmDialog] = useState(null);

            const showToast = (message, type = 'info') => { setToast({ message, type }); setTimeout(() => setToast(null), 3500); };
            const confirmAction = (message, onConfirm) => { setConfirmDialog({ message, onConfirm: () => { onConfirm(); setConfirmDialog(null); } }); };

            useEffect(() => {
                let unsubSettings = () => {}; let unsubReqs = () => {}; let unsubPOs = () => {}; let unsubRecipes = () => {};
                const initializeDB = async () => {
                    const settingsRef = db.collection('settings').doc('main'); const docSnap = await settingsRef.get();
                    if (!docSnap.exists) {
                        const now = new Date(); const initialMonth = `${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getFullYear()).slice(-2)}`;
                        await settingsRef.set({ suppliers: DEFAULT_SUPPLIERS, inventory: DEFAULT_INVENTORY, prepItems: [], poCounter: { month: initialMonth, count: 1 }, ownerPhone: '', prices: {}, aliases: {} });
                    }
                    unsubSettings = settingsRef.onSnapshot(doc => {
                        if (doc.exists) {
                            const data = doc.data(); const rawInv = data.inventory || DEFAULT_INVENTORY; const scrubbedInv = {};
                            Object.keys(rawInv).forEach(key => { scrubbedInv[key] = [...new Set(rawInv[key])]; });
                            setSuppliers(data.suppliers || DEFAULT_SUPPLIERS); setInventory(scrubbedInv); setPrepItems(data.prepItems || []); setPoCounter(data.poCounter); setOwnerPhone(data.ownerPhone || ''); setPrices(data.prices || {}); setAliases(data.aliases || {});
                        }
                    });
                    unsubReqs = db.collection('requests').onSnapshot(snap => { const reqData = []; snap.forEach(d => reqData.push(d.data())); setRequests(reqData.sort((a,b) => String(b.id).localeCompare(String(a.id)))); });
                    unsubPOs = db.collection('pos').onSnapshot(snap => { const poData = []; snap.forEach(d => poData.push(d.data())); setPos(poData.sort((a,b) => String(b.id).localeCompare(String(a.id)))); });
                    unsubRecipes = db.collection('recipes').onSnapshot(snap => { const recData = []; snap.forEach(d => recData.push(d.data())); setRecipes(recData.sort((a,b) => String(a.name).localeCompare(String(b.name)))); });
                    setLoading(false);
                };
                initializeDB();
                return () => { unsubSettings(); unsubReqs(); unsubPOs(); unsubRecipes(); };
            }, []);

            const updateAlias = (rawInvoiceName, dbItemName) => { const newAliases = { ...aliases, [rawInvoiceName]: dbItemName }; setAliases(newAliases); db.collection('settings').doc('main').update({ aliases: newAliases }); };
            
            const convertToCost = (qty, fromUnit, priceObj) => {
                if (!priceObj || !priceObj.price || isNaN(priceObj.price)) return 0;
                let factor = 1; const pUnit = priceObj.unit;
                if (fromUnit === 'ml' && pUnit === 'Ltr') factor = 0.001; if (fromUnit === 'Ltr' && pUnit === 'ml') factor = 1000;
                if (fromUnit === 'gms' && pUnit === 'Kg') factor = 0.001; if (fromUnit === 'Kg' && pUnit === 'gms') factor = 1000;
                return (Number(qty) * factor) * Number(priceObj.price);
            };

            const generatePONumber = () => {
                const now = new Date(); const currentMonthYear = `${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getFullYear()).slice(-2)}`;
                let newCount = poCounter.count; if (poCounter.month !== currentMonthYear) { newCount = 1; }
                const paddedCount = String(newCount).padStart(3, '0');
                db.collection('settings').doc('main').update({ poCounter: { month: currentMonthYear, count: newCount + 1 } });
                return `TCM/${currentMonthYear}/${paddedCount}`;
            };

            const submitMasterRequest = (items) => {
                const reqId = 'REQ-' + Math.floor(1000 + Math.random() * 9000);
                db.collection('requests').doc(reqId).set({ id: reqId, items, date: new Date().toLocaleDateString('en-GB') });
                
                if (ownerPhone && ownerPhone.trim() !== '') {
                    const itemList = items.map((i, index) => `${index + 1}. ${i.name} — ${i.qty} ${i.unit}`).join('\n');
                    const message = `*New Master Request: ${reqId}*\n\nHello, the staff has prepared a new order list.\n\n*Items Requested:*\n${itemList}\n\nPlease check the TCM Dashboard.`;
                    
                    let phoneStr = ownerPhone.replace(/\D/g, ''); 
                    if (phoneStr.length === 10) phoneStr = '91' + phoneStr; 
                    
                    window.open(`https://wa.me/${phoneStr}?text=${encodeURIComponent(message)}`, '_blank');
                } else {
                    showToast('Master Request sent to database!', 'success');
                }
            };

            const sendWhatsApp = (po) => {
                if(po.supplier === "Cash Purchase") return showToast("Internal Cash Purchase PO generated.", "info");
                
                const itemList = po.items.map((i, index) => `${index + 1}. ${i.name} — ${i.qty} ${i.unit}`).join('\n');
                const isResend = po.status === 'Delivered'; 
                const prefix = isResend ? `*[RESENT FOR RECORDS]*\n` : ``;

                const message = `${prefix}*Subject:* Purchase Order - TCM BrewOps\n*PO Number:* ${po.id}\n*Date:* ${po.date}\n\nHello ${po.supplier},\nPlease arrange the delivery of the following items:\n\n*Order Details:*\n${itemList}\n\n*Delivery Address:*\nThe Caffeine Ministry \n'PARASUDAI', 672, 12th C Road, \nSardarpura, Jodhpur\n\nThank you,\nTeam Caffeine Ministry`;
                
                let url = `https://wa.me/`;
                if (po.supplierPhone) { 
                    let phoneStr = po.supplierPhone.replace(/\D/g, ''); 
                    if (phoneStr.length === 10) phoneStr = '91' + phoneStr; 
                    url += `${phoneStr}?text=${encodeURIComponent(message)}`; 
                } else {
                    url += `?text=${encodeURIComponent(message)}`;
                }
                
                window.open(url, '_blank');
            };

            const createCombinedPO = (selectedItems, vendorObj) => {
                const rawPoId = generatePONumber(); const safeDbId = rawPoId.replace(/\//g, '-');
                const newPo = { id: rawPoId, supplier: vendorObj.name, supplierPhone: vendorObj.phone, status: 'Approved', date: new Date().toLocaleDateString('en-GB') };
                
                const combinedItems = [];
                selectedItems.forEach(si => {
                    const existing = combinedItems.find(i => i.name === si.item.name && i.unit === si.item.unit);
                    if (existing) existing.qty = Number(existing.qty) + Number(si.item.qty); else combinedItems.push({...si.item, qty: Number(si.item.qty)});
                });
                newPo.items = combinedItems; 
                db.collection('pos').doc(safeDbId).set(newPo);
                
                const reqsToUpdate = {};
                selectedItems.forEach(si => { if (!reqsToUpdate[si.reqId]) reqsToUpdate[si.reqId] = []; reqsToUpdate[si.reqId].push(si.itemIndex); });
                
                Object.keys(reqsToUpdate).forEach(reqId => {
                    const req = requests.find(r => r.id === reqId);
                    if (req) {
                        const indicesToRemove = reqsToUpdate[reqId]; const remaining = req.items.filter((_, idx) => !indicesToRemove.includes(idx));
                        if (remaining.length === 0) db.collection('requests').doc(reqId).delete(); else db.collection('requests').doc(reqId).update({ items: remaining });
                    }
                });
                
                sendWhatsApp(newPo);
            };

            const receivePO = (poId, receivedItemsData) => {
                db.collection('pos').doc(poId.replace(/\//g, '-')).update({ status: 'Delivered', receivedItems: receivedItemsData, deliveryDate: new Date().toLocaleDateString('en-GB') });
                const newPrices = { ...prices }; let pricesUpdated = false;
                receivedItemsData.forEach(item => {
                    if (item.receivedQty > 0 && item.totalPrice && Number(item.totalPrice) > 0) {
                        newPrices[item.name] = { price: Number((Number(item.totalPrice) / Number(item.receivedQty)).toFixed(2)), unit: item.unit }; pricesUpdated = true;
                    }
                });
                if (pricesUpdated) db.collection('settings').doc('main').update({ prices: newPrices });
                showToast(pricesUpdated ? 'Intake logged & Price Book updated!' : 'Intake logged successfully!', 'success');
            };

            const deletePO = (poId) => confirmAction("Delete official PO?", () => db.collection('pos').doc(poId.replace(/\//g, '-')).delete());
            const removeRequestItem = (reqId, itemIndex) => confirmAction("Remove item?", () => { const req = requests.find(r => r.id === reqId); const remaining = req.items.filter((_, idx) => idx !== itemIndex); if (remaining.length === 0) db.collection('requests').doc(reqId).delete(); else db.collection('requests').doc(reqId).update({ items: remaining }); });

            if (loading) return ( <div className="min-h-screen bg-paper flex flex-col items-center justify-center font-serif text-victorian"> <img src="TCM BrewOps icon.jpg?v=2" alt="TCM" className="h-32 w-32 object-cover rounded-2xl shadow-elegant animate-pulse" /> </div> );

            // --- REDESIGNED LOGIN SCREEN WITH RESTORED GREEN & GOLD THEME ---
            if (!role) {
                return (
                    <div className="min-h-screen flex justify-center items-center overflow-hidden relative bg-[#132A1B]">
                        
                        {/* Custom Style Block for Login Screen précis CSS */}
                        <style>{`
                            .vintage-leaf-overlay::before {
                                content: "";
                                position: absolute;
                                inset: 0;
                                background-image: url('leaf-pattern.jpg');
                                background-repeat: repeat;
                                background-size: 400px;
                                opacity: 0.08;
                                pointer-events: none;
                            }
                            
                            .login-card {
                                background: rgba(255, 255, 255, 0.75);
                                backdrop-filter: blur(10px);
                            }
                            
                            .logo-portrait {
                                width: 90px;
                                height: 90px;
                                border-radius: 50%;
                                border: 1px solid rgba(212, 175, 55, 0.4);
                                object-fit: cover;
                            }
                            
                            input:focus {
                                border-color: #D4AF37 !important;
                                box-shadow: 0 0 5px rgba(212, 175, 55, 0.3) !important;
                            }
                            
                            .btn-gold {
                                background: linear-gradient(135deg, #D4AF37, #F2DF96);
                                color: #132A1B;
                                text-shadow: 0 1px 0 rgba(255,255,255,0.2);
                            }
                        `}</style>

                    <div className={`fixed inset-y-0 left-0 w-72 bg-victorian text-paper shadow-2xl z-50 transform transition-transform duration-300 ease-in-out ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="flex justify-between items-center p-6 border-b border-white/10">
                            <div className="flex items-center space-x-3">
                                <div className="flex flex-col"><h1 className="text-xl font-serif font-bold uppercase tracking-wider text-antique">TCM<br/>BrewOps</h1></div>
                            </div>
                            <button onClick={() => setSidebarOpen(false)} className="text-gray-400 hover:text-white"><Icons.Close/></button>
                        </div>
                        <div className="p-4 space-y-2 flex flex-col h-[calc(100vh-100px)]">
                            <div className="flex-1 space-y-2 mt-4">
                                <p className="text-[10px] text-gray-500 uppercase tracking-widest font-bold px-4 mb-4">{role} Navigation</p>
                                {menuItems.map(item => (
                                    <button key={item.id} onClick={() => { setActiveTab(item.id); setSidebarOpen(false); }} className={`w-full text-left px-4 py-3.5 font-bold text-xs uppercase tracking-widest rounded-xl transition-all ${activeTab === item.id ? 'bg-antique text-victorian shadow-md' : 'text-gray-300 hover:bg-white/10 hover:text-white'}`}>
                                        {item.label}
                                    </button>
                                ))}
                            </div>
                            <button onClick={onLogout} className="w-full text-left px-4 py-3.5 font-bold text-xs uppercase tracking-widest rounded-xl text-dangerLight hover:bg-danger/20 transition-all">Log Out</button>
                        </div>
                    </div>

                    <header className="bg-victorian/95 backdrop-blur-xl text-paper p-4 shadow-elegant sticky top-0 z-30 border-b border-antique/30">
                        <div className="flex items-center max-w-6xl mx-auto px-2 lg:px-6 relative">
                            <button onClick={() => setSidebarOpen(true)} className="mr-4 text-antique hover:text-white transition-colors"><Icons.Menu/></button>
                            <div className="flex-1 flex justify-center py-2">
                                <p className="font-serif font-bold text-3xl uppercase tracking-widest text-white drop-shadow-sm flex items-center gap-3">
                                    <Icons.FileText />TCM BrewOps<Icons.Box />
                                </p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto mt-6 px-4 lg:px-6">
                        {children}
                    </main>
                </div>
            );
        };

        function App() {
            const [role, setRole] = useState(null);
            const [loading, setLoading] = useState(true);
            const [staffTab, setStaffTab] = useState('dashboard'); 
            const [ownerTab, setOwnerTab] = useState('dashboard'); 
            
            const [requests, setRequests] = useState([]); const [pos, setPos] = useState([]); const [poCounter, setPoCounter] = useState({ month: '', count: 1 });
            const [suppliers, setSuppliers] = useState([]); const [inventory, setInventory] = useState(DEFAULT_INVENTORY);
            const [prepItems, setPrepItems] = useState([]); const [ownerPhone, setOwnerPhone] = useState('');
            const [recipes, setRecipes] = useState([]); const [prices, setPrices] = useState({}); const [aliases, setAliases] = useState({});
            
            const [toast, setToast] = useState(null); const [confirmDialog, setConfirmDialog] = useState(null);

            const showToast = (message, type = 'info') => { setToast({ message, type }); setTimeout(() => setToast(null), 3500); };
            const confirmAction = (message, onConfirm) => { setConfirmDialog({ message, onConfirm: () => { onConfirm(); setConfirmDialog(null); } }); };

            useEffect(() => {
                let unsubSettings = () => {}; let unsubReqs = () => {}; let unsubPOs = () => {}; let unsubRecipes = () => {};
                const initializeDB = async () => {
                    const settingsRef = db.collection('settings').doc('main'); const docSnap = await settingsRef.get();
                    if (!docSnap.exists) {
                        const now = new Date(); const initialMonth = `${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getFullYear()).slice(-2)}`;
                        await settingsRef.set({ suppliers: DEFAULT_SUPPLIERS, inventory: DEFAULT_INVENTORY, prepItems: [], poCounter: { month: initialMonth, count: 1 }, ownerPhone: '', prices: {}, aliases: {} });
                    }
                    unsubSettings = settingsRef.onSnapshot(doc => {
                        if (doc.exists) {
                            const data = doc.data(); const rawInv = data.inventory || DEFAULT_INVENTORY; const scrubbedInv = {};
                            Object.keys(rawInv).forEach(key => { scrubbedInv[key] = [...new Set(rawInv[key])]; });
                            setSuppliers(data.suppliers || DEFAULT_SUPPLIERS); setInventory(scrubbedInv); setPrepItems(data.prepItems || []); setPoCounter(data.poCounter); setOwnerPhone(data.ownerPhone || ''); setPrices(data.prices || {}); setAliases(data.aliases || {});
                        }
                    });
                    unsubReqs = db.collection('requests').onSnapshot(snap => { const reqData = []; snap.forEach(d => reqData.push(d.data())); setRequests(reqData.sort((a,b) => String(b.id).localeCompare(String(a.id)))); });
                    unsubPOs = db.collection('pos').onSnapshot(snap => { const poData = []; snap.forEach(d => poData.push(d.data())); setPos(poData.sort((a,b) => String(b.id).localeCompare(String(a.id)))); });
                    unsubRecipes = db.collection('recipes').onSnapshot(snap => { const recData = []; snap.forEach(d => recData.push(d.data())); setRecipes(recData.sort((a,b) => String(a.name).localeCompare(String(b.name)))); });
                    setLoading(false);
                };
                initializeDB();
                return () => { unsubSettings(); unsubReqs(); unsubPOs(); unsubRecipes(); };
            }, []);

            const updateAlias = (rawInvoiceName, dbItemName) => { const newAliases = { ...aliases, [rawInvoiceName]: dbItemName }; setAliases(newAliases); db.collection('settings').doc('main').update({ aliases: newAliases }); };
            
            const convertToCost = (qty, fromUnit, priceObj) => {
                if (!priceObj || !priceObj.price || isNaN(priceObj.price)) return 0;
                let factor = 1; const pUnit = priceObj.unit;
                if (fromUnit === 'ml' && pUnit === 'Ltr') factor = 0.001; if (fromUnit === 'Ltr' && pUnit === 'ml') factor = 1000;
                if (fromUnit === 'gms' && pUnit === 'Kg') factor = 0.001; if (fromUnit === 'Kg' && pUnit === 'gms') factor = 1000;
                return (Number(qty) * factor) * Number(priceObj.price);
            };

            const generatePONumber = () => {
                const now = new Date(); const currentMonthYear = `${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getFullYear()).slice(-2)}`;
                let newCount = poCounter.count; if (poCounter.month !== currentMonthYear) { newCount = 1; }
                const paddedCount = String(newCount).padStart(3, '0');
                db.collection('settings').doc('main').update({ poCounter: { month: currentMonthYear, count: newCount + 1 } });
                return `TCM/${currentMonthYear}/${paddedCount}`;
            };

            const submitMasterRequest = (items) => {
                const reqId = 'REQ-' + Math.floor(1000 + Math.random() * 9000);
                db.collection('requests').doc(reqId).set({ id: reqId, items, date: new Date().toLocaleDateString('en-GB') });
                
                if (ownerPhone && ownerPhone.trim() !== '') {
                    const itemList = items.map((i, index) => `${index + 1}. ${i.name} — ${i.qty} ${i.unit}`).join('\n');
                    const message = `*New Master Request: ${reqId}*\n\nHello, the staff has prepared a new order list.\n\n*Items Requested:*\n${itemList}\n\nPlease check the TCM Dashboard.`;
                    
                    let phoneStr = ownerPhone.replace(/\D/g, ''); 
                    if (phoneStr.length === 10) phoneStr = '91' + phoneStr; 
                    
                    window.open(`https://wa.me/${phoneStr}?text=${encodeURIComponent(message)}`, '_blank');
                } else {
                    showToast('Master Request sent to database!', 'success');
                }
            };

            const sendWhatsApp = (po) => {
                if(po.supplier === "Cash Purchase") return showToast("Internal Cash Purchase PO generated.", "info");
                
                const itemList = po.items.map((i, index) => `${index + 1}. ${i.name} — ${i.qty} ${i.unit}`).join('\n');
                const isResend = po.status === 'Delivered'; 
                const prefix = isResend ? `*[RESENT FOR RECORDS]*\n` : ``;

                const message = `${prefix}*Subject:* Purchase Order - TCM BrewOps\n*PO Number:* ${po.id}\n*Date:* ${po.date}\n\nHello ${po.supplier},\nPlease arrange the delivery of the following items:\n\n*Order Details:*\n${itemList}\n\n*Delivery Address:*\nThe Caffeine Ministry \n'PARASUDAI', 672, 12th C Road, \nSardarpura, Jodhpur\n\nThank you,\nTeam Caffeine Ministry`;
                
                let url = `https://wa.me/`;
                if (po.supplierPhone) { 
                    let phoneStr = po.supplierPhone.replace(/\D/g, ''); 
                    if (phoneStr.length === 10) phoneStr = '91' + phoneStr; 
                    url += `${phoneStr}?text=${encodeURIComponent(message)}`; 
                } else {
                    url += `?text=${encodeURIComponent(message)}`;
                }
                
                window.open(url, '_blank');
            };

            const createCombinedPO = (selectedItems, vendorObj) => {
                const rawPoId = generatePONumber(); const safeDbId = rawPoId.replace(/\//g, '-');
                const newPo = { id: rawPoId, supplier: vendorObj.name, supplierPhone: vendorObj.phone, status: 'Approved', date: new Date().toLocaleDateString('en-GB') };
                
                const combinedItems = [];
                selectedItems.forEach(si => {
                    const existing = combinedItems.find(i => i.name === si.item.name && i.unit === si.item.unit);
                    if (existing) existing.qty = Number(existing.qty) + Number(si.item.qty); else combinedItems.push({...si.item, qty: Number(si.item.qty)});
                });
                newPo.items = combinedItems; 
                db.collection('pos').doc(safeDbId).set(newPo);
                
                const reqsToUpdate = {};
                selectedItems.forEach(si => { if (!reqsToUpdate[si.reqId]) reqsToUpdate[si.reqId] = []; reqsToUpdate[si.reqId].push(si.itemIndex); });
                
                Object.keys(reqsToUpdate).forEach(reqId => {
                    const req = requests.find(r => r.id === reqId);
                    if (req) {
                        const indicesToRemove = reqsToUpdate[reqId]; const remaining = req.items.filter((_, idx) => !indicesToRemove.includes(idx));
                        if (remaining.length === 0) db.collection('requests').doc(reqId).delete(); else db.collection('requests').doc(reqId).update({ items: remaining });
                    }
                });
                
                sendWhatsApp(newPo);
            };

            const receivePO = (poId, receivedItemsData) => {
                db.collection('pos').doc(poId.replace(/\//g, '-')).update({ status: 'Delivered', receivedItems: receivedItemsData, deliveryDate: new Date().toLocaleDateString('en-GB') });
                const newPrices = { ...prices }; let pricesUpdated = false;
                receivedItemsData.forEach(item => {
                    if (item.receivedQty > 0 && item.totalPrice && Number(item.totalPrice) > 0) {
                        newPrices[item.name] = { price: Number((Number(item.totalPrice) / Number(item.receivedQty)).toFixed(2)), unit: item.unit }; pricesUpdated = true;
                    }
                });
                if (pricesUpdated) db.collection('settings').doc('main').update({ prices: newPrices });
                showToast(pricesUpdated ? 'Intake logged & Price Book updated!' : 'Intake logged successfully!', 'success');
            };

            const deletePO = (poId) => confirmAction("Delete official PO?", () => db.collection('pos').doc(poId.replace(/\//g, '-')).delete());
            const removeRequestItem = (reqId, itemIndex) => confirmAction("Remove item?", () => { const req = requests.find(r => r.id === reqId); const remaining = req.items.filter((_, idx) => idx !== itemIndex); if (remaining.length === 0) db.collection('requests').doc(reqId).delete(); else db.collection('requests').doc(reqId).update({ items: remaining }); });

            if (loading) return ( <div className="min-h-screen bg-paper flex flex-col items-center justify-center font-serif text-victorian"> <img src="TCM BrewOps icon.jpg?v=2" alt="TCM" className="h-32 w-32 object-cover rounded-2xl shadow-elegant animate-pulse" /> </div> );

            // --- REDESIGNED LOGIN SCREEN WITH RESTORED GREEN & GOLD THEME ---
            if (!role) {
                return (
                    <div className="min-h-screen flex justify-center items-center overflow-hidden relative bg-[#132A1B]">
                        
                        {/* Custom Style Block for Login Screen précis CSS */}
                        <style>{`
                            .vintage-leaf-overlay::before {
                                content: "";
                                position: absolute;
                                inset: 0;
                                background-image: url('leaf-pattern.jpg');
                                background-repeat: repeat;
                                background-size: 400px;
                                opacity: 0.08;
                                pointer-events: none;
                            }
                            
                            .login-card {
                                background: rgba(255, 255, 255, 0.75);
                                backdrop-filter: blur(10px);
                            }
                            
                            .logo-portrait {
                                width: 90px;
                                height: 90px;
                                border-radius: 50%;
                                border: 1px solid rgba(212, 175, 55, 0.4);
                                object-fit: cover;
                            }
                            
                            input:focus {
                                border-color: #D4AF37 !important;
                                box-shadow: 0 0 5px rgba(212, 175, 55, 0.3) !important;
                            }
                            
                            .btn-gold {
                                background: linear-gradient(135deg, #D4AF37, #F2DF96);
                                color: #132A1B;
                                text-shadow: 0 1px 0 rgba(255,255,255,0.2);
                            }
                        `}</style>
                        
                        {/* Leaf pattern overlay */}
                        <div className="absolute inset-0 vintage-leaf-overlay z-0"></div>

                        <div className="relative z-10 flex justify-center items-center w-full max-w-4xl mx-auto">
                            
                            {/* Left Illustration */}
                            <img src="left_clipboard.jpg" className="absolute left-[-140px] md:left-[-120px] bottom-[20px] w-[180px] md:w-[200px] opacity-90 hidden md:block pointer-events-none transform -rotate-12 mix-blend-multiply" alt="Inventory" />
                            
                            {/* Right Illustration */}
                            <img src="right_coffee.png" className="absolute right-[-140px] md:right-[-120px] bottom-[-20px] w-[180px] md:w-[200px] opacity-90 hidden md:block pointer-events-none transform rotate-6 mix-blend-multiply" alt="Stock" />

                            <div className="login-card w-[360px] p-[30px] rounded-[20px] shadow-login text-center relative z-20">

                                {/* Logo (Restored circular portrait style) */}
                                <img src="Brewster-Pen.jpg" className="logo-portrait mx-auto mb-[5px] mix-blend-multiply" alt="TCM BrewOps" />

                                {/* Main App Name (Image replacement for text) */}
                                <img src="Name.jpg" className="app-name-img w-[280px] mx-auto block mix-blend-multiply" alt="TCM BrewOps" />

                                {/* Tagline (Poppins font, gold color, uppercase) */}
                                <div className="tagline font-poppins text-xs text-[#D4AF37] font-medium my-[10px] mb-[25px] tracking-wide uppercase">
                                    Inventory & Recipe Management
                                </div>

                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const pin = e.target.pin.value;
                                    if (pin === '170117') { setRole('owner'); setOwnerTab('dashboard'); showToast('Welcome back, Owner.', 'success'); }
                                    else if (pin === '1234') { setRole('staff'); setStaffTab('dashboard'); showToast('Terminal accessible.', 'success'); }
                                    else showToast('Invalid PIN', 'error');
                                }}>
                                    <div className="mb-[15px]">
                                        <input 
                                            type="password" 
                                            name="pin" 
                                            autoFocus 
                                            placeholder="••••••" 
                                            className="w-full p-4 rounded-[10px] border border-gray-300 outline-none transition-all text-center text-3xl tracking-[0.5em] font-mono bg-white/80" 
                                        />
                                    </div>

                                    {/* Gold gradient button */}
                                    <button type="submit" className="btn-gold w-full p-4 border-none rounded-[10px] text-[15px] font-bold uppercase tracking-widest cursor-pointer transition-all hover:-translate-y-[2px] hover:shadow-[0_8px_20px_rgba(0,0,0,0.15)] font-poppins mt-2">
                                        Access BrewOps
                                    </button>
                                </form>
                                <div className="mt-6 text-[10px] text-gray-400 font-medium">Internal Use Only</div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <>
                    {toast && ( <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-[100] animate-slide-up"> <div className={`px-6 py-3 rounded-full shadow-2xl backdrop-blur-md border border-white/20 font-medium text-sm text-white flex items-center space-x-2 ${toast.type === 'error' ? 'bg-danger/90' : toast.type === 'success' ? 'bg-victorian/90' : 'bg-gray-800/90'}`}> {toast.type === 'success' && <Icons.Check />} <span>{toast.message}</span> </div> </div> )}
                    {confirmDialog && ( <div className="fixed inset-0 bg-victorian/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100] animate-fade-in"> <div className="bg-paper p-6 rounded-2xl shadow-2xl w-full max-w-sm border border-antique/30 text-center"> <h3 className="font-serif font-bold text-xl text-victorian mb-2">Are you sure?</h3> <p className="text-sm text-gray-600 mb-6">{confirmDialog.message}</p> <div className="flex space-x-3"> <button onClick={() => setConfirmDialog(null)} className="w-1/2 bg-white border border-gray-200 text-gray-600 font-bold py-3 text-xs uppercase tracking-widest rounded-xl hover:bg-gray-50 transition-colors">Cancel</button> <button onClick={confirmDialog.onConfirm} className="w-1/2 bg-danger text-white font-bold py-3 text-xs uppercase tracking-widest rounded-xl hover:bg-danger/90 transition-colors shadow-md">Confirm</button> </div> </div> </div> )}

                    <DashboardLayout role={role} activeTab={role === 'owner' ? ownerTab : staffTab} setActiveTab={role === 'owner' ? setOwnerTab : setStaffTab} onLogout={() => setRole(null)}>
                        {role === 'staff' ? 
                            <StaffView inventory={inventory} units={UNITS} onSubmit={submitMasterRequest} pos={pos} onReceive={receivePO} requests={requests} recipes={recipes} prepItems={prepItems} staffTab={staffTab} setStaffTab={setStaffTab} prices={prices} convertToCost={convertToCost} aliases={aliases} updateAlias={updateAlias} compressImage={compressImage} showToast={showToast} confirmAction={confirmAction} Icons={Icons} /> : 
                            <OwnerView requests={requests} pos={pos} onCreateCombinedPO={createCombinedPO} onRemoveRequestItem={removeRequestItem} onDelete={deletePO} suppliers={suppliers} addSupplier={()=>{const n = window.prompt("Vendor Name:"); if(n) {const p = window.prompt("Mobile:"); db.collection('settings').doc('main').update({suppliers:[...suppliers,{name:n.trim(),phone:p?p.trim():""}]});showToast("Added", "success");}}} editSupplier={(old)=>{const v=suppliers.find(s=>s.name===old); if(v){const n=window.prompt("Name:",v.name); if(n){const p=window.prompt("Mobile:",v.phone); db.collection('settings').doc('main').update({suppliers:suppliers.map(s=>s.name===old?{name:n.trim(),phone:p?p.trim():""}:s)});}}}} deleteSupplier={(n)=>confirmAction(`Delete vendor?`, ()=>db.collection('settings').doc('main').update({suppliers:suppliers.filter(s=>s.name!==n)}))} inventory={inventory} prepItems={prepItems} ownerPhone={ownerPhone} recipes={recipes} units={UNITS} ownerTab={ownerTab} setOwnerTab={setOwnerTab} prices={prices} convertToCost={convertToCost} aliases={aliases} updateAlias={updateAlias} compressImage={compressImage} showToast={showToast} confirmAction={confirmAction} Icons={Icons} onResend={sendWhatsApp} />
                        }
                    </DashboardLayout>
                </>
            );
        }

        // --- DASHBOARD SUMMARY COMPONENTS ---
        const DashboardMetric = ({ title, value, subtitle, icon, bgColor = "bg-white/80" }) => (
            <div className={`${bgColor} backdrop-blur-xl p-6 rounded-2xl shadow-elegant border border-white/50 flex flex-col justify-between hover:-translate-y-1 transition-transform`}>
                <div className="flex justify-between items-start mb-4">
                    <p className="text-[10px] font-bold text-gray-500 uppercase tracking-widest leading-tight w-2/3">{title}</p>
                    <div className="text-antique bg-antiqueLight/20 p-2 rounded-xl">{icon}</div>
                </div>
                <div>
                    <h3 className="text-4xl font-serif font-bold text-victorian">{value}</h3>
                    {subtitle && <p className="text-xs text-gray-600 font-medium mt-1">{subtitle}</p>}
                </div>
            </div>
        );

        const OwnerDashboardSummary = ({ pos, requests, recipes, prepItems, setOwnerTab }) => {
            const activePOs = pos.filter(po => po.status === 'Approved');
            return (
                <div className="animate-fade-in space-y-6">
                    <h2 className="text-2xl font-serif font-bold text-white drop-shadow-md mb-2">System Overview</h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div onClick={()=>setOwnerTab('recipes')} className="cursor-pointer"><DashboardMetric title="Master Recipes" value={recipes.length} icon={<Icons.FileText/>} /></div>
                        <div onClick={()=>setOwnerTab('orders')} className="cursor-pointer"><DashboardMetric title="Active BrewOps Orders" value={activePOs.length} icon={<Icons.Box/>} bgColor={activePOs.length > 0 ? "bg-antiqueLight/90 border-antique" : "bg-white/80"} subtitle={activePOs.length > 0 ? "Deliveries arriving soon" : "No pending deliveries"} /></div>
                        <div onClick={()=>setOwnerTab('conversions')} className="cursor-pointer"><DashboardMetric title="Inventory Alerts (Low)" value={3} icon={<Icons.Activity/>} bgColor="bg-dangerLight border-danger/30" subtitle="Prep reglas need raw materials" /></div>
                    </div>
                </div>
            );
        };

        const StaffDashboardSummary = ({ pos, requests, setStaffTab }) => {
            const activePOs = pos.filter(po => po.status === 'Approved');
            return (
                <div className="animate-fade-in space-y-6">
                    <h2 className="text-2xl font-serif font-bold text-white drop-shadow-md mb-2">Terminal Overview</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div onClick={()=>setStaffTab('order')} className="cursor-pointer"><DashboardMetric title="Incoming Deliveries (Awaiting Scanner)" value={activePOs.length} icon={<Icons.Box/>} bgColor={activePOs.length > 0 ? "bg-antiqueLight/90 border-antique" : "bg-white/80"} subtitle={activePOs.length > 0 ? "Scanner intake required" : "No pending deliveries"} /></div>
                        <div onClick={()=>setStaffTab('order')} className="cursor-pointer"><DashboardMetric title="Requests Awaiting Approval" value={requests.length} icon={<Icons.FileText/>} subtitle="Awaiting Owner action" /></div>
                    </div>
                    <button onClick={() => setStaffTab('order')} className="w-full bg-victorian/95 backdrop-blur-xl text-antique border border-antique/30 font-bold py-5 rounded-2xl shadow-elegant hover:bg-victorian transition-all uppercase tracking-widest text-sm flex items-center justify-center gap-2 mt-8">
                        <span className="text-xl font-light leading-none">+</span> Draft BrewOps Order
                    </button>
                </div>
            );
        };

        // --- STAFF VIEW ---
        function StaffView({ inventory, units, onSubmit, pos, onReceive, requests, recipes, prepItems, staffTab, setStaffTab, prices, convertToCost, aliases, updateAlias, compressImage, showToast, confirmAction, Icons }) {
            const [cart, setCart] = useState([]); const [selectedCategory, setSelectedCategory] = useState(Object.keys(inventory)[0]); const [searchTerm, setSearchTerm] = useState('');
            const [receivingPO, setReceivingPO] = useState(null); const [receivedQuantities, setReceivedQuantities] = useState({}); const [receivedPrices, setReceivedPrices] = useState({}); 
            const [unmatchedScans, setUnmatchedScans] = useState([]); const [isScanning, setIsScanning] = useState(false);
            const [recipeSearchFilter, setRecipeSearchFilter] = useState(''); const [activeRecipeTab, setActiveRecipeTab] = useState('All');
            const [showAddModal, setShowAddModal] = useState(false); const [modalItemName, setModalItemName] = useState(''); const [modalQty, setModalQty] = useState(''); const [modalUnit, setModalUnit] = useState('Kg');

            const openAddModal = (item) => { if (cart.find(i => i.name === item)) return showToast("Already in cart", "error"); setModalItemName(item); setModalQty(''); setModalUnit('Kg'); setShowAddModal(true); };
            const confirmAddItem = () => { if(!modalQty || Number(modalQty) <= 0) return showToast("Invalid quantity", "error"); setCart([...cart, { name: modalItemName, qty: Number(modalQty), unit: modalUnit }]); setShowAddModal(false); };
            const removeItem = (index) => setCart(cart.filter((_, i) => i !== index));
            const handleSubmit = () => { if (cart.length === 0) return showToast('Cart is empty', 'error'); onSubmit(cart); setCart([]); setSearchTerm(''); };
            const openReceiveScreen = (po) => { setReceivingPO(po); const initialQty = {}; const initialPrices = {}; po.items.forEach((item, idx) => { initialQty[idx] = item.qty; initialPrices[idx] = ''; }); setReceivedQuantities(initialQty); setReceivedPrices(initialPrices); setUnmatchedScans([]); };

            const handleRealAIScan = async (e) => {
                const files = Array.from(e.target.files); if (files.length === 0) return;
                setIsScanning(true);
                try {
                    let allScannedItems = []; const scanInvoice = firebase.functions().httpsCallable('scanInvoice');
                    for (let file of files) { const compressedBase64 = await compressImage(file); const response = await scanInvoice({ image: compressedBase64 }); if (response.data.lineItems) allScannedItems = [...allScannedItems, ...response.data.lineItems]; }
                    const autoQty = { ...receivedQuantities }; const autoPrices = { ...receivedPrices }; const unmatched = []; const usedScans = new Set();
                    receivingPO.items.forEach((poItem, idx) => {
                        let matchIndex = allScannedItems.findIndex((scan, i) => !usedScans.has(i) && aliases[scan.name] === poItem.name);
                        if (matchIndex === -1) matchIndex = allScannedItems.findIndex((scan, i) => !usedScans.has(i) && (poItem.name.toLowerCase().includes(scan.name.toLowerCase().split(' ')[0]) || scan.name.toLowerCase().includes(poItem.name.toLowerCase().split(' ')[0])));
                        if (matchIndex !== -1) { const match = allScannedItems[matchIndex]; autoQty[idx] = match.quantity; autoPrices[idx] = match.totalPrice; usedScans.add(matchIndex); } else { autoQty[idx] = ''; autoPrices[idx] = ''; }
                    });
                    allScannedItems.forEach((scan, i) => { if (!usedScans.has(i)) unmatched.push(scan); });
                    setReceivedQuantities(autoQty); setReceivedPrices(autoPrices); setUnmatchedScans(unmatched);
                    if (unmatched.length > 0) showToast(`Mapped partially. Map ${unmatched.length} items below.`, 'info'); else showToast("Perfect Auto-Match!", 'success');
                } catch (error) { console.error(error); showToast(`Scan failed: Server error.`, 'error'); } finally { setIsScanning(false); }
            };

            const submitReceive = () => { const receivedItemsData = receivingPO.items.map((item, idx) => ({ ...item, receivedQty: Number(receivedQuantities[idx]) || 0, totalPrice: Number(receivedPrices[idx]) || 0 })); onReceive(receivingPO.id, receivedItemsData); setReceivingPO(null); };

            let displayedItems = searchTerm.trim() !== '' ? [...new Set(Object.values(inventory).flat())].filter(item => item.toLowerCase().includes(searchTerm.toLowerCase())) : (inventory[selectedCategory] || []);
            const incomingPOs = pos.filter(po => po.status === 'Approved');
            const displayedRecipes = recipes.filter(r => { const matchesSearch = r.name.toLowerCase().includes(recipeSearchFilter.toLowerCase()); const matchesCat = activeRecipeTab === 'All' || (r.category || 'Beverages') === activeRecipeTab; return matchesSearch && matchesCat; });

            if (staffTab === 'dashboard') return <StaffDashboardSummary pos={pos} requests={requests} setStaffTab={setStaffTab} />;

            if (receivingPO) return (
                <div className="animate-fade-in bg-white/80 backdrop-blur-xl p-5 rounded-2xl shadow-elegant border border-white/40">
                    <div className="flex justify-between items-center mb-5 border-b border-gray-200/50 pb-3"><h2 className="text-xl font-serif font-bold text-victorian">Delivery Intake</h2><button onClick={() => setReceivingPO(null)} className="text-danger font-bold text-xs uppercase tracking-wider hover:bg-danger/10 px-3 py-1.5 rounded-lg transition-colors">Cancel</button></div>
                    <div className="mb-6 bg-paper/60 p-4 rounded-xl border border-white/50 shadow-sm"><p className="text-[10px] text-gray-500 uppercase tracking-widest mb-1">BrewOps Order Reference</p><p className="font-bold text-victorian text-lg mb-4">{receivingPO.id}</p>
                        <div className="relative"><input type="file" accept="image/*" multiple id="invoice-upload" className="hidden" onChange={handleRealAIScan} /><label htmlFor="invoice-upload" className={`w-full flex justify-center items-center py-3.5 border rounded-xl text-xs font-bold uppercase tracking-widest cursor-pointer transition-all ${isScanning ? 'bg-antiqueLight/30 border-antique text-victorian shadow-inner' : 'bg-white border-victorian/20 text-victorian hover:border-victorian shadow-sm hover:shadow-md'}`}>{isScanning ? <span className="animate-pulse flex items-center">⏳ Processor Running...</span> : <span className="flex items-center gap-2"><Icons.Camera/> Auto-Scan Invoice</span>}</label></div>
                    </div>
                    <div className="mb-6 space-y-3">
                        <div className="flex justify-between text-[10px] font-bold text-gray-400 uppercase tracking-widest pb-2 border-b border-gray-200 space-x-2"><span className="w-2/5">Item Name</span><span className="w-1/5 text-center">Ord</span><span className="w-1/5 text-center">Rec</span><span className="w-1/5 text-center">Inv (₹)</span></div>
                        {receivingPO.items.map((item, idx) => (
                            <div key={idx} className="flex flex-col py-2 border-b border-gray-100 last:border-0 pb-3">
                                <div className="flex justify-between items-center space-x-2"><span className="text-xs w-2/5 pr-1 font-medium text-gray-800 leading-tight">{item.name}</span><span className="text-xs text-center w-1/5 text-gray-500 font-medium leading-tight">{item.qty}<br/><span className="text-[9px]">{item.unit}</span></span><input type="number" min="0" step="any" className="w-1/5 border border-gray-200 rounded-lg p-2 text-center font-bold text-sm bg-white focus:ring-2 focus:ring-antique/50" value={receivedQuantities[idx]} onChange={(e) => setReceivedQuantities({...receivedQuantities, [idx]: e.target.value})} /><input type="number" min="0" step="any" placeholder="₹" className="w-1/5 border border-antique/50 rounded-lg p-2 text-center font-bold text-sm bg-white focus:ring-2 focus:ring-antique" value={receivedPrices[idx]} onChange={(e) => setReceivedPrices({...receivedPrices, [idx]: e.target.value})} /></div>
                                {unmatchedScans.length > 0 && (!receivedQuantities[idx] && !receivedPrices[idx]) && (
                                    <div className="mt-2 w-full"><select className="w-full text-[10px] border border-dashed border-antique bg-antiqueLight/20 text-victorian p-2 font-bold uppercase tracking-widest rounded-lg focus:outline-none" value="" onChange={(e) => { const scanObj = unmatchedScans.find(u => u.name === e.target.value); if(scanObj){ setReceivedQuantities({...receivedQuantities, [idx]: scanObj.quantity}); setReceivedPrices({...receivedPrices, [idx]: scanObj.totalPrice}); setUnmatchedScans(unmatchedScans.filter(u => u.name !== e.target.value)); updateAlias(e.target.value, item.name); showToast("Mapped!", "success"); } }}><option value="">🔗 AI Missed this. Map item...</option>{unmatchedScans.map(u => (<option key={u.name} value={u.name}>{u.name} (Qty: {u.quantity}, ₹{u.totalPrice})</option>))}</select></div>
                                )}
                            </div>
                        ))}
                    </div>
                    <button onClick={submitReceive} className="w-full bg-victorian text-antique uppercase tracking-widest text-xs font-bold py-4 rounded-xl hover:bg-victorianLight transition-all hover:shadow-lg hover:-translate-y-0.5">Confirm BrewOps Delivery</button>
                </div>
            );

            return (
                <div className="animate-fade-in relative">
                    {staffTab === 'recipes' && (
                        <div className="animate-fade-in">
                            <div className="relative mb-5 shadow-sm"><span className="absolute inset-y-0 left-0 pl-4 flex items-center text-victorian/40 text-lg">⚲</span><input type="text" className="w-full pl-11 p-4 border border-white/50 bg-white/70 backdrop-blur-xl rounded-xl text-sm shadow-sm" placeholder="Search the ledger..." value={recipeSearchFilter} onChange={(e) => setRecipeSearchFilter(e.target.value)}/></div>
                            {!recipeSearchFilter && <div className="flex overflow-x-auto space-x-2 mb-6 pb-2 hide-scrollbar">{['All', ...RECIPE_CATEGORIES].map(cat => <button key={cat} onClick={() => setActiveRecipeTab(cat)} className={`whitespace-nowrap px-4 py-2 text-xs uppercase tracking-wider rounded-lg transition-all shadow-sm ${activeRecipeTab === cat ? 'bg-victorian text-paper font-bold scale-[1.02]' : 'bg-white/70 backdrop-blur-md text-victorian hover:bg-white font-medium'}`}>{cat}</button>)}</div>}
                            {displayedRecipes.length === 0 ? <p className="text-sm text-victorian/60 italic bg-white/70 backdrop-blur-md p-8 rounded-2xl shadow-elegant border border-white/50 text-center">No records found.</p> : 
                                displayedRecipes.map(recipe => (
                                    <div key={recipe.id} className="bg-white/80 backdrop-blur-xl rounded-2xl shadow-elegant border border-white/50 p-6 mb-5 hover:shadow-xl transition-shadow">
                                        <div className="flex justify-between items-start mb-5 border-b border-victorian/10 pb-4"><h3 className="font-serif font-bold text-victorian text-2xl leading-tight pr-2">{recipe.name}</h3><span className="text-[9px] uppercase font-bold tracking-[0.2em] bg-paper/80 border border-victorian/10 text-victorian/70 px-2.5 py-1.5 rounded-lg whitespace-nowrap mt-1">{recipe.category || 'Beverages'}</span></div>
                                        <div className="flex flex-col space-y-4 mb-5"><div className="bg-paper/50 p-4 rounded-xl border border-white/60 shadow-sm"><p className="text-[10px] font-bold text-victorian/50 uppercase tracking-[0.2em] mb-3">Ingredients</p><ul className="text-sm space-y-2.5">{recipe.ingredients.map((ing, i) => (<li key={i} className="flex justify-between items-end border-b border-victorian/5 pb-1.5"><span className="font-medium text-victorian/80">{ing.name} {ing.isCustom && <span className="text-[10px] text-victorian/40 font-normal ml-1 italic">(Custom)</span>}</span><span className="font-bold text-victorian">{ing.qty} {ing.unit}</span></li>))}</ul></div></div>
                                        <p className="text-[10px] font-bold text-victorian/50 uppercase tracking-[0.2em] mb-2">Method & Notes</p><div className="text-sm text-victorian/80 whitespace-pre-wrap leading-relaxed border-l-2 border-antique pl-4 py-1">{recipe.instructions || "Standard preparation."}</div>
                                    </div>
                                ))
                            }
                        </div>
                    )}

                    {staffTab === 'order' && (
                        <div className="animate-fade-in">
                            {showAddModal && (
                                <div className="fixed inset-0 bg-victorian/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
                                    <div className="bg-paper p-6 rounded-2xl shadow-2xl w-full max-w-sm border border-antique/30"><h3 className="font-serif font-bold text-xl text-victorian mb-1">Add to Request</h3><p className="text-sm text-gray-600 mb-6 truncate">{modalItemName}</p><div className="flex space-x-4 mb-8"><div className="w-1/2"><label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block">Quantity</label><input type="number" min="0" step="any" value={modalQty} onChange={e=>setModalQty(e.target.value)} className="w-full border border-gray-200 rounded-xl p-3 text-center font-bold text-lg bg-white shadow-inner" placeholder="0" /></div><div className="w-1/2"><label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block">Unit</label><select value={modalUnit} onChange={e=>setModalUnit(e.target.value)} className="w-full border border-gray-200 rounded-xl p-3 text-lg bg-white font-medium text-gray-700 shadow-sm">{units.map(u => <option key={u} value={u}>{u}</option>)}</select></div></div><div className="flex space-x-3"><button onClick={() => setShowAddModal(false)} className="w-1/2 bg-white border border-gray-200 text-gray-600 font-bold py-3 text-xs uppercase tracking-widest rounded-xl hover:bg-gray-50 transition-colors">Cancel</button><button onClick={confirmAddItem} className="w-1/2 bg-victorian text-antique border border-antique/30 font-bold py-3 text-xs uppercase tracking-widest rounded-xl hover:bg-victorianLight transition-colors shadow-md">Add</button></div></div>
                                </div>
                            )}

                            {incomingPOs.length > 0 && (
                                <div className="mb-6 bg-white/80 backdrop-blur-xl rounded-2xl p-5 shadow-elegant border border-white/50 animate-alert-flash"><h3 className="text-xs font-bold uppercase tracking-widest text-victorian mb-4 flex items-center"><span className="mr-2 text-lg">⚠️</span> Incoming Deliveries</h3>{incomingPOs.map(po => (<div key={po.id} className="bg-paper/80 p-4 rounded-xl border border-victorian/10 mb-3 flex justify-between items-center last:mb-0"><div><p className="font-bold text-sm text-victorian mb-0.5">{po.id}</p><p className="text-xs text-gray-600">{po.supplier}</p></div><button onClick={() => openReceiveScreen(po)} className="bg-white border border-victorian/30 text-victorian text-xs font-bold py-2 px-4 rounded-lg hover:border-victorian transition-all uppercase tracking-wider shadow-sm hover:shadow-md flex items-center gap-1.5"><Icons.Camera /> Intake & Scan</button></div>))}</div>
                            )}

                            <h2 className="text-xl font-serif font-semibold text-victorian mb-4 shadow-sm backdrop-blur-md inline-block px-3 py-1 rounded-lg bg-white/40">Request BrewOps Inventory</h2>
                            <div className="relative mb-5 shadow-sm"><span className="absolute inset-y-0 left-0 pl-4 flex items-center text-victorian/40 text-lg">⚲</span><input type="text" className="w-full pl-11 p-4 border border-white/50 bg-white/70 backdrop-blur-xl rounded-xl text-sm shadow-sm" placeholder="Search catalog..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}/></div>

                            {!searchTerm && (
                                <div className="flex overflow-x-auto space-x-2 mb-6 pb-2 hide-scrollbar">{Object.keys(inventory).map(cat => <button key={cat} onClick={() => setSelectedCategory(cat)} className={`whitespace-nowrap px-4 py-2 text-xs uppercase tracking-wider rounded-lg transition-all shadow-sm ${selectedCategory === cat ? 'bg-victorian text-paper font-bold scale-[1.02]' : 'bg-white/70 backdrop-blur-md text-victorian hover:bg-white font-medium'}`}>{cat.split(' ')[0]}</button>)}</div>
                            )}

                            <div className="bg-white/70 backdrop-blur-xl rounded-2xl shadow-elegant border border-white/50 p-2 mb-8 max-h-[45vh] overflow-y-auto">
                                {displayedItems.length === 0 ? <p className="text-victorian/50 text-sm text-center py-8 italic">No items found</p> : 
                                    displayedItems.map(item => (<div key={item} className="flex justify-between items-center py-3.5 px-4 border-b border-victorian/5 last:border-0 hover:bg-white/90 rounded-lg transition-colors"><span className="text-sm font-medium text-victorian/90 pr-2">{item}</span><button onClick={() => openAddModal(item)} className="text-antique bg-antiqueLight/20 w-8 h-8 rounded-full flex items-center justify-center text-xl font-light hover:bg-antique hover:text-white transition-colors leading-none shadow-sm">+</button></div>))
                                }
                            </div>

                            {cart.length > 0 && (
                                <div className="bg-victorian/95 backdrop-blur-xl text-paper rounded-2xl p-6 shadow-elegant mb-6 border-t-4 border-antique">
                                    <div className="flex justify-between items-end mb-5 border-b border-white/10 pb-3"><h3 className="font-serif font-bold text-xl text-antique">Active BrewOps Draft</h3><span className="text-xs uppercase tracking-widest text-gray-400 bg-white/10 px-2.5 py-1 rounded-lg">{cart.length} items</span></div>
                                    <div className="space-y-4 mb-8">{cart.map((item, idx) => (<div key={idx} className="flex justify-between items-center group"><div className="flex flex-col"><span className="text-sm font-medium">{item.name}</span><span className="text-xs text-antique font-bold mt-0.5">{item.qty} {item.unit}</span></div><button onClick={() => removeItem(idx)} className="text-gray-400 hover:text-danger p-2 transition-colors rounded-lg hover:bg-white/5"><Icons.Trash/></button></div>))}</div>
                                    <button onClick={handleSubmit} className="w-full bg-antique text-victorian font-bold py-4 rounded-xl uppercase tracking-widest text-xs hover:bg-antiqueLight transition-all shadow-lg hover:-translate-y-0.5 flex justify-center items-center gap-2"><Icons.Send/> Submit BrewOps Order</button>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }
