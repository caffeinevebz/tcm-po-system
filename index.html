<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Caffeine Ministry - PO System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1b4332">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { parchment: '#fcfbf7', hunter: '#1b4332', antiqueGold: '#b8860b' },
                    fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>body { background-color: #fcfbf7; color: #1b4332; }</style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAcE76Pc46oOJ3FMqb4kcojbvq5ACPuwaE",
            authDomain: "tcm-orders.firebaseapp.com",
            projectId: "tcm-orders",
            storageBucket: "tcm-orders.firebasestorage.app",
            messagingSenderId: "994764639663",
            appId: "1:994764639663:web:2b0a682f2cb1001d37335a",
            measurementId: "G-PLG3WH801B"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        // --- DEFAULT DATA ---
        const DEFAULT_SUPPLIERS = [
            { "name": "Rare Beans Company", "phone": "8619122260" }, { "name": "Aditya Industries", "phone": "9595711611" },
            { "name": "Renu Devi & Sons", "phone": "7737840411" }, { "name": "Cash Purchase", "phone": "" }
        ];

        const DEFAULT_INVENTORY = {
            "Fruits and Vegetables": ["Apple (सेव)", "Avocado (अवोकेडो)", "Banana (केले)", "Broccoli (ब्रोकली)", "Tomato (टमाटर) (Grevy)"],
            "Coffee and Matcha": ["Full House Green (Arabica Coffee)", "Baarbara Green (Cold Brew)", "Matcha (Premium Grade)"],
            "Groceries": ["Aata", "Amul Butter", "Amul Cheese Slice (Large Pack)", "Amul Cream", "Sugar", "Tata Salt", "Milk (Full Cream)"],
            "Packing and Consumables": ["Brown Paper Bag", "Hot coffee cup (180 ML)", "Pizza Boxes"]
        };
        const UNITS = ["Kg", "gms", "Piece", "Pkt", "Jar", "Carton", "Tin", "bunch", "Ltr", "ml", "tsp", "tbsp"];

        function App() {
            const [role, setRole] = useState('staff'); 
            const [loading, setLoading] = useState(true);

            // Cloud States
            const [requests, setRequests] = useState([]); 
            const [pos, setPos] = useState([]); 
            const [poCounter, setPoCounter] = useState({ month: '', count: 1 });
            const [suppliers, setSuppliers] = useState([]);
            const [inventory, setInventory] = useState(DEFAULT_INVENTORY);
            const [ownerPhone, setOwnerPhone] = useState('');
            const [recipes, setRecipes] = useState([]); 

            useEffect(() => {
                let unsubSettings = () => {};
                let unsubReqs = () => {};
                let unsubPOs = () => {};
                let unsubRecipes = () => {};

                const initializeDB = async () => {
                    const settingsRef = db.collection('settings').doc('main');
                    const docSnap = await settingsRef.get();
                    
                    if (!docSnap.exists) {
                        const now = new Date();
                        const initialMonth = `${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getFullYear()).slice(-2)}`;
                        await settingsRef.set({
                            suppliers: DEFAULT_SUPPLIERS,
                            inventory: DEFAULT_INVENTORY,
                            poCounter: { month: initialMonth, count: 1 },
                            ownerPhone: ''
                        });
                    }

                    unsubSettings = settingsRef.onSnapshot(doc => {
                        if (doc.exists) {
                            const data = doc.data();
                            setSuppliers(data.suppliers || DEFAULT_SUPPLIERS);
                            setInventory(data.inventory || DEFAULT_INVENTORY);
                            setPoCounter(data.poCounter);
                            setOwnerPhone(data.ownerPhone || '');
                        }
                    });

                    unsubReqs = db.collection('requests').onSnapshot(snap => {
                        const reqData = [];
                        snap.forEach(d => reqData.push(d.data()));
                        setRequests(reqData.sort((a,b) => String(b.id).localeCompare(String(a.id)))); 
                    });

                    unsubPOs = db.collection('pos').onSnapshot(snap => {
                        const poData = [];
                        snap.forEach(d => poData.push(d.data()));
                        setPos(poData.sort((a,b) => String(b.id).localeCompare(String(a.id))));
                    });

                    unsubRecipes = db.collection('recipes').onSnapshot(snap => {
                        const recData = [];
                        snap.forEach(d => recData.push(d.data()));
                        setRecipes(recData.sort((a,b) => String(a.name).localeCompare(String(b.name))));
                    });

                    setLoading(false);
                };

                initializeDB();
                return () => { unsubSettings(); unsubReqs(); unsubPOs(); unsubRecipes(); };
            }, []);

            const generatePONumber = () => {
                const now = new Date();
                const currentMonthYear = `${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getFullYear()).slice(-2)}`;
                let newCount = poCounter.count;
                if (poCounter.month !== currentMonthYear) { newCount = 1; }
                const paddedCount = String(newCount).padStart(3, '0');
                
                db.collection('settings').doc('main').update({
                    poCounter: { month: currentMonthYear, count: newCount + 1 }
                });
                return `TCM/${currentMonthYear}/${paddedCount}`;
            };

            const submitMasterRequest = (items) => {
                const reqId = 'REQ-' + Math.floor(1000 + Math.random() * 9000);
                const newReq = { id: reqId, items, date: new Date().toLocaleDateString('en-GB') };
                db.collection('requests').doc(reqId).set(newReq);
                
                if (ownerPhone && ownerPhone.trim() !== '') {
                    const itemList = items.map((i, index) => `${index + 1}. ${i.name} — ${i.qty} ${i.unit}`).join('\n');
                    const message = `*New Master Request: ${reqId}*\n\nHello, the staff has prepared a new order list.\n\n*Items Requested:*\n${itemList}\n\nPlease check the TCM Dashboard.`;
                    let phoneStr = ownerPhone.replace(/\D/g, '');
                    if (phoneStr.length === 10) phoneStr = '91' + phoneStr; 
                    window.open(`https://wa.me/${phoneStr}?text=${encodeURIComponent(message)}`, '_blank');
                } else {
                    alert('Master Request sent to Cloud Database!');
                }
            };

            const createCombinedPO = (selectedItems, vendorObj) => {
                const rawPoId = generatePONumber();
                const safeDbId = rawPoId.replace(/\//g, '-');
                const newPo = { id: rawPoId, supplier: vendorObj.name, supplierPhone: vendorObj.phone, status: 'Approved', date: new Date().toLocaleDateString('en-GB') };

                const combinedItems = [];
                selectedItems.forEach(si => {
                    const item = si.item;
                    const existing = combinedItems.find(i => i.name === item.name && i.unit === item.unit);
                    if (existing) existing.qty = Number(existing.qty) + Number(item.qty);
                    else combinedItems.push({...item, qty: Number(item.qty)});
                });
                newPo.items = combinedItems;
                db.collection('pos').doc(safeDbId).set(newPo);

                const reqsToUpdate = {};
                selectedItems.forEach(si => {
                    if (!reqsToUpdate[si.reqId]) reqsToUpdate[si.reqId] = [];
                    reqsToUpdate[si.reqId].push(si.itemIndex);
                });

                Object.keys(reqsToUpdate).forEach(reqId => {
                    const req = requests.find(r => r.id === reqId);
                    if (req) {
                        const indicesToRemove = reqsToUpdate[reqId];
                        const remaining = req.items.filter((_, idx) => !indicesToRemove.includes(idx));
                        if (remaining.length === 0) db.collection('requests').doc(reqId).delete();
                        else db.collection('requests').doc(reqId).update({ items: remaining });
                    }
                });
                sendWhatsApp(newPo);
            };

            const receivePO = (poId, receivedItemsData) => {
                const safeDbId = poId.replace(/\//g, '-');
                db.collection('pos').doc(safeDbId).update({ status: 'Delivered', receivedItems: receivedItemsData, deliveryDate: new Date().toLocaleDateString('en-GB') });
                alert('Delivery confirmed in database!');
            };

            const deletePO = (poId) => {
                if(window.confirm("Permanently delete this official PO?")) {
                    const safeDbId = poId.replace(/\//g, '-');
                    db.collection('pos').doc(safeDbId).delete();
                }
            };

            const removeRequestItem = (reqId, itemIndex) => {
                if(!window.confirm("Remove this item from the request?")) return;
                const req = requests.find(r => r.id === reqId);
                const remaining = req.items.filter((_, idx) => idx !== itemIndex);
                if (remaining.length === 0) db.collection('requests').doc(reqId).delete();
                else db.collection('requests').doc(reqId).update({ items: remaining });
            };

            const sendWhatsApp = (po) => {
                if(po.supplier === "Cash Purchase") return alert("Internal Cash Purchase PO generated.");
                const itemList = po.items.map((i, index) => `${index + 1}. ${i.name} — ${i.qty} ${i.unit}`).join('\n');
                const message = `*Subject:* New Purchase Order - The Caffeine Ministry\n*PO Number:* ${po.id}\n*Date:* ${po.date}\n\nHello ${po.supplier},\nPlease arrange the delivery of the following items:\n\n*Order Details:*\n${itemList}\n\n*Delivery Address:*\nThe Caffeine Ministry \n'PARASUDAI', 672, 12th C Road, \nSardarpura, Jodhpur\n\nThank you,\nTeam Caffeine Ministry`;
                let url = `https://wa.me/`;
                if (po.supplierPhone) {
                    let phoneStr = po.supplierPhone.replace(/\D/g, '');
                    if (phoneStr.length === 10) phoneStr = '91' + phoneStr; 
                    url += `${phoneStr}?text=${encodeURIComponent(message)}`;
                } else url += `?text=${encodeURIComponent(message)}`;
                window.open(url, '_blank');
            };

            const addSupplier = () => {
                const name = window.prompt("Enter new Vendor Name:");
                if (!name || name.trim() === '') return;
                const phone = window.prompt("Enter Vendor Mobile Number (Optional):");
                const newSuppliers = [...suppliers, { name: name.trim(), phone: phone ? phone.trim() : "" }];
                db.collection('settings').doc('main').update({ suppliers: newSuppliers });
            };

            const handleSwitchRole = () => {
                if (role === 'staff') {
                    const pin = window.prompt("Enter Owner PIN:");
                    if (pin === "1701") setRole('owner'); 
                    else if (pin !== null) alert("Incorrect PIN.");
                } else setRole('staff');
            };

            if (loading) return <div className="min-h-screen bg-parchment flex items-center justify-center font-serif text-hunter text-xl font-bold animate-pulse">Brewing cloud database...</div>;

            return (
                <div className="min-h-screen bg-parchment pb-24">
                    <header className="bg-hunter text-parchment p-4 shadow-md sticky top-0 z-40 flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-serif font-bold tracking-wide">The Caffeine Ministry</h1>
                            <p className="text-xs text-antiqueGold uppercase tracking-widest font-sans">Kitchen & Operations</p>
                        </div>
                        <button onClick={handleSwitchRole} className="bg-antiqueGold text-hunter text-sm font-bold py-1 px-3 rounded shadow-sm hover:bg-yellow-500 transition">
                            {role === 'staff' ? 'Owner Login' : 'Log Out to Staff'}
                        </button>
                    </header>
                    <main className="max-w-md mx-auto mt-6 px-4">
                        {role === 'staff' ? 
                            <StaffView inventory={inventory} units={UNITS} onSubmit={submitMasterRequest} pos={pos} onReceive={receivePO} requests={requests} recipes={recipes} /> : 
                            <OwnerView requests={requests} pos={pos} onCreateCombinedPO={createCombinedPO} onRemoveRequestItem={removeRequestItem} onDelete={deletePO} onResend={sendWhatsApp} suppliers={suppliers} addSupplier={addSupplier} inventory={inventory} ownerPhone={ownerPhone} recipes={recipes} units={UNITS} />
                        }
                    </main>
                </div>
            );
        }

        // --- STAFF VIEW ---
        function StaffView({ inventory, units, onSubmit, pos, onReceive, requests, recipes }) {
            const [cart, setCart] = useState([]);
            const [selectedCategory, setSelectedCategory] = useState(Object.keys(inventory)[0]);
            const [searchTerm, setSearchTerm] = useState('');
            const [receivingPO, setReceivingPO] = useState(null);
            const [receivedQuantities, setReceivedQuantities] = useState({});
            const [staffTab, setStaffTab] = useState('order');

            const [showAddModal, setShowAddModal] = useState(false);
            const [modalItemName, setModalItemName] = useState('');
            const [modalQty, setModalQty] = useState('');
            const [modalUnit, setModalUnit] = useState('Kg');

            const openAddModal = (item) => {
                if (cart.find(i => i.name === item)) return alert("Item is already in your cart.");
                setModalItemName(item); setModalQty(''); setModalUnit('Kg'); setShowAddModal(true);
            };

            const confirmAddItem = () => {
                if(!modalQty || Number(modalQty) <= 0) return alert("Please enter a valid quantity.");
                setCart([...cart, { name: modalItemName, qty: Number(modalQty), unit: modalUnit }]);
                setShowAddModal(false);
            };

            const removeItem = (index) => setCart(cart.filter((_, i) => i !== index));
            const handleSubmit = () => {
                if (cart.length === 0) return alert('Cart is empty.');
                onSubmit(cart); setCart([]); setSearchTerm('');
            };

            const openReceiveScreen = (po) => {
                setReceivingPO(po);
                const initialQty = {};
                po.items.forEach((item, idx) => { initialQty[idx] = item.qty; });
                setReceivedQuantities(initialQty);
            };

            const submitReceive = () => {
                const receivedItemsData = receivingPO.items.map((item, idx) => ({ ...item, receivedQty: Number(receivedQuantities[idx]) || 0 }));
                onReceive(receivingPO.id, receivedItemsData);
                setReceivingPO(null);
            };

            let displayedItems = [];
            if (searchTerm.trim() !== '') {
                displayedItems = [...new Set(Object.values(inventory).flat())].filter(item => item.toLowerCase().includes(searchTerm.toLowerCase()));
            } else {
                displayedItems = inventory[selectedCategory] || [];
            }

            const incomingPOs = pos.filter(po => po.status === 'Approved');

            if (receivingPO) {
                return (
                    <div className="animate-fade-in bg-white p-4 rounded-lg shadow-md border-t-4 border-hunter">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-xl font-serif font-bold text-hunter">Delivery Intake</h2>
                            <button onClick={() => setReceivingPO(null)} className="text-red-500 font-bold">Cancel</button>
                        </div>
                        <p className="text-sm text-gray-600 mb-2"><strong>PO:</strong> {receivingPO.id}</p>
                        <div className="bg-gray-50 p-3 rounded mb-6 max-h-80 overflow-y-auto">
                            {receivingPO.items.map((item, idx) => (
                                <div key={idx} className="flex justify-between items-center border-b py-3 last:border-0">
                                    <span className="text-sm w-1/2 pr-2">{item.name}</span>
                                    <span className="text-sm text-center w-1/4 text-gray-500">{item.qty} {item.unit}</span>
                                    <input type="number" min="0" step="any" className="w-16 border border-hunter rounded p-1 text-center font-bold" value={receivedQuantities[idx]} onChange={(e) => setReceivedQuantities({...receivedQuantities, [idx]: e.target.value})} />
                                </div>
                            ))}
                        </div>
                        <button onClick={submitReceive} className="w-full bg-hunter text-parchment font-bold py-3 rounded shadow-md">Confirm Delivery</button>
                    </div>
                );
            }

            return (
                <div className="animate-fade-in relative">
                    <div className="flex mb-6 border-b border-gray-300">
                        <button onClick={() => setStaffTab('order')} className={`w-1/2 py-3 font-bold text-sm uppercase tracking-wider ${staffTab === 'order' ? 'border-b-4 border-hunter text-hunter' : 'text-gray-400 hover:text-gray-600'}`}>🛒 Draft Order</button>
                        <button onClick={() => setStaffTab('recipes')} className={`w-1/2 py-3 font-bold text-sm uppercase tracking-wider ${staffTab === 'recipes' ? 'border-b-4 border-hunter text-hunter' : 'text-gray-400 hover:text-gray-600'}`}>📖 Recipes</button>
                    </div>

                    {staffTab === 'recipes' && (
                        <div className="animate-fade-in">
                            <h2 className="text-xl font-serif font-semibold border-b-2 border-hunter pb-2 mb-4">Kitchen Recipe Book</h2>
                            {recipes.length === 0 ? <p className="text-sm text-gray-500 italic">No recipes have been built yet.</p> : 
                                recipes.map(recipe => (
                                    <div key={recipe.id} className="bg-white rounded-lg shadow-sm border border-gray-200 p-4 mb-4">
                                        <h3 className="font-bold text-hunter text-lg mb-2">{recipe.name}</h3>
                                        <div className="bg-gray-50 p-2 rounded mb-3">
                                            <p className="text-xs font-bold text-gray-500 uppercase mb-1">Ingredients:</p>
                                            <ul className="text-sm">
                                                {recipe.ingredients.map((ing, i) => (
                                                    <li key={i} className="flex justify-between border-b border-gray-200 last:border-0 py-1">
                                                        <span>{ing.name}</span><span className="font-bold">{ing.qty} {ing.unit}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                        <p className="text-xs font-bold text-gray-500 uppercase mb-1">Method:</p>
                                        <p className="text-sm text-gray-700 whitespace-pre-wrap">{recipe.instructions || "No instructions provided."}</p>
                                    </div>
                                ))
                            }
                        </div>
                    )}

                    {staffTab === 'order' && (
                        <div className="animate-fade-in">
                            {showAddModal && (
                                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
                                    <div className="bg-parchment p-6 rounded-lg shadow-2xl w-full max-w-sm border-2 border-hunter">
                                        <h3 className="font-serif font-bold text-lg text-hunter mb-1">Add to Master List</h3>
                                        <p className="text-sm text-gray-700 mb-5 truncate font-bold">{modalItemName}</p>
                                        <div className="flex space-x-3 mb-6">
                                            <div className="w-1/2">
                                                <label className="text-xs font-bold text-gray-500 mb-1">Quantity</label>
                                                <input type="number" min="0" step="any" value={modalQty} onChange={e=>setModalQty(e.target.value)} className="w-full border border-hunter rounded p-3 text-center font-bold text-lg" placeholder="0" />
                                            </div>
                                            <div className="w-1/2">
                                                <label className="text-xs font-bold text-gray-500 mb-1">Unit</label>
                                                <select value={modalUnit} onChange={e=>setModalUnit(e.target.value)} className="w-full border border-hunter rounded p-3 text-lg bg-white">
                                                    {units.map(u => <option key={u} value={u}>{u}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="flex space-x-3">
                                            <button onClick={() => setShowAddModal(false)} className="w-1/2 bg-gray-200 text-gray-800 font-bold py-3 rounded">Cancel</button>
                                            <button onClick={confirmAddItem} className="w-1/2 bg-antiqueGold text-hunter font-bold py-3 rounded">Add to Cart</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {incomingPOs.length > 0 && (
                                <div className="mb-8 bg-blue-50 border border-blue-200 rounded-lg p-4 shadow-sm">
                                    <h3 className="text-sm font-bold uppercase tracking-widest text-blue-800 mb-3">🚚 Incoming Deliveries</h3>
                                    {incomingPOs.map(po => (
                                        <div key={po.id} className="bg-white p-3 rounded shadow-sm mb-2 border-l-4 border-blue-500 flex justify-between items-center">
                                            <div><p className="font-bold text-sm">{po.id}</p><p className="text-xs text-gray-600">{po.supplier}</p></div>
                                            <button onClick={() => openReceiveScreen(po)} className="bg-blue-600 text-white text-xs font-bold py-2 px-3 rounded">Receive</button>
                                        </div>
                                    ))}
                                </div>
                            )}

                            <h2 className="text-xl font-serif font-semibold border-b-2 border-hunter pb-2 mb-4">Build Master Request List</h2>
                            <div className="relative mb-4 shadow-sm">
                                <span className="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">🔍</span>
                                <input type="text" className="w-full pl-10 p-3 border border-hunter bg-white rounded" placeholder="Search items..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}/>
                            </div>

                            {!searchTerm && (
                                <div className="flex overflow-x-auto space-x-2 mb-4 pb-2">
                                    {Object.keys(inventory).map(cat => (
                                        <button key={cat} onClick={() => setSelectedCategory(cat)} className={`whitespace-nowrap px-4 py-2 text-sm rounded-full border ${selectedCategory === cat ? 'bg-hunter text-parchment' : 'bg-white text-hunter border-hunter'}`}>
                                            {cat.split(' ')[0]}
                                        </button>
                                    ))}
                                </div>
                            )}

                            <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-3 mb-6 h-64 overflow-y-auto">
                                {displayedItems.length === 0 ? <p className="text-gray-500 text-sm text-center py-4">No items found</p> : 
                                    displayedItems.map(item => (
                                        <div key={item} className="flex justify-between items-center py-2 border-b last:border-0">
                                            <span className="text-sm pr-2">{item}</span>
                                            <button onClick={() => openAddModal(item)} className="text-antiqueGold text-xl font-bold px-3">+</button>
                                        </div>
                                    ))
                                }
                            </div>

                            {cart.length > 0 && (
                                <div className="bg-hunter text-parchment rounded-lg p-4 shadow-md mb-6">
                                    <h3 className="font-serif font-bold text-lg mb-3">Master Cart</h3>
                                    {cart.map((item, idx) => (
                                        <div key={idx} className="flex justify-between items-center mb-3 bg-white/10 p-3 rounded">
                                            <div className="flex flex-col">
                                                <span className="text-sm font-semibold">{item.name}</span>
                                                <span className="text-xs text-antiqueGold font-bold">{item.qty} {item.unit}</span>
                                            </div>
                                            <button onClick={() => removeItem(idx)} className="text-red-300 text-xs font-bold px-2 py-1 bg-white/10 rounded">Remove</button>
                                        </div>
                                    ))}
                                    <button onClick={handleSubmit} className="w-full mt-2 bg-antiqueGold text-hunter font-bold py-3 rounded uppercase">Send Master List to Owner</button>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // --- OWNER VIEW ---
        function OwnerView({ requests, pos, onCreateCombinedPO, onRemoveRequestItem, onDelete, onResend, suppliers, addSupplier, inventory, ownerPhone, recipes, units }) {
            const historyPOs = pos.filter(po => po.status !== 'Pending');
            const [ownerTab, setOwnerTab] = useState('orders'); 
            
            const [selectedItems, setSelectedItems] = useState([]);
            const [selectedVendor, setSelectedVendor] = useState('');
            const [dbCategory, setDbCategory] = useState(Object.keys(inventory)[0]);
            const [localPhone, setLocalPhone] = useState(ownerPhone);

            const [isBuildingRecipe, setIsBuildingRecipe] = useState(false);
            const [recipeName, setRecipeName] = useState('');
            const [recipeInstructions, setRecipeInstructions] = useState('');
            const [recipeCart, setRecipeCart] = useState([]);
            const [recSearch, setRecSearch] = useState('');
            const [recCat, setRecCat] = useState(Object.keys(inventory)[0]);

            const [showRecAdd, setShowRecAdd] = useState(false);
            const [recModalItem, setRecModalItem] = useState('');
            const [recModalQty, setRecModalQty] = useState('');
            const [recModalUnit, setRecModalUnit] = useState('gms');

            const savePhoneToCloud = () => db.collection('settings').doc('main').update({ ownerPhone: localPhone });

            const handleCheck = (reqId, itemIndex, item) => {
                const isSelected = selectedItems.some(i => i.reqId === reqId && i.itemIndex === itemIndex);
                if (isSelected) setSelectedItems(selectedItems.filter(i => !(i.reqId === reqId && i.itemIndex === itemIndex)));
                else setSelectedItems([...selectedItems, { reqId, itemIndex, item }]);
            };

            const handleGeneratePO = () => {
                if (selectedItems.length === 0) return alert('Check the box next to at least one item.');
                if (!selectedVendor) return alert('Please select a vendor.');
                const vendorObj = suppliers.find(s => s.name === selectedVendor);
                onCreateCombinedPO(selectedItems, vendorObj);
                setSelectedItems([]); setSelectedVendor('');
            };

            const handleSaveRecipe = () => {
                if(!recipeName.trim()) return alert("Recipe needs a name.");
                if(recipeCart.length === 0) return alert("Add at least one ingredient.");
                const recipeId = 'REC-' + Date.now();
                const newRec = { id: recipeId, name: recipeName.trim(), instructions: recipeInstructions.trim(), ingredients: recipeCart, date: new Date().toLocaleDateString('en-GB') };
                db.collection('recipes').doc(recipeId).set(newRec);
                alert("Recipe saved to Cloud Book!");
                setIsBuildingRecipe(false);
                setRecipeName(''); setRecipeInstructions(''); setRecipeCart([]);
            };

            const deleteRecipe = (id) => {
                if(window.confirm("Permanently delete this recipe?")) db.collection('recipes').doc(id).delete();
            };

            const openRecAdd = (item) => {
                if (recipeCart.find(i => i.name === item)) return alert("Ingredient already added.");
                setRecModalItem(item); setRecModalQty(''); setRecModalUnit('gms'); setShowRecAdd(true);
            };
            const confirmRecAdd = () => {
                if(!recModalQty || Number(recModalQty) <= 0) return alert("Valid quantity needed.");
                setRecipeCart([...recipeCart, { name: recModalItem, qty: Number(recModalQty), unit: recModalUnit }]);
                setShowRecAdd(false);
            };

            const handleAddInventoryItem = () => {
                const newItem = window.prompt(`Enter new item name for ${dbCategory}:`);
                if (newItem && newItem.trim() !== '') {
                    const newInv = { ...inventory };
                    newInv[dbCategory] = [...newInv[dbCategory], newItem.trim()].sort();
                    db.collection('settings').doc('main').update({ inventory: newInv });
                }
            };
            const handleEditInventoryItem = (oldName) => {
                const newName = window.prompt(`Edit item name:`, oldName);
                if (newName && newName.trim() !== '' && newName !== oldName) {
                    const newInv = { ...inventory };
                    newInv[dbCategory] = newInv[dbCategory].map(item => item === oldName ? newName.trim() : item).sort();
                    db.collection('settings').doc('main').update({ inventory: newInv });
                }
            };
            const handleDeleteInventoryItem = (name) => {
                if(window.confirm(`Are you sure you want to delete "${name}" from ${dbCategory}?`)){
                    const newInv = { ...inventory };
                    newInv[dbCategory] = newInv[dbCategory].filter(item => item !== name);
                    db.collection('settings').doc('main').update({ inventory: newInv });
                }
            };

            return (
                <div className="animate-fade-in relative">
                    <div className="flex mb-6 border-b border-gray-300">
                        <button onClick={() => setOwnerTab('orders')} className={`w-1/3 py-3 font-bold text-xs uppercase tracking-wider ${ownerTab === 'orders' ? 'border-b-4 border-hunter text-hunter' : 'text-gray-400'}`}>📦 Orders</button>
                        <button onClick={() => setOwnerTab('recipes')} className={`w-1/3 py-3 font-bold text-xs uppercase tracking-wider ${ownerTab === 'recipes' ? 'border-b-4 border-hunter text-hunter' : 'text-gray-400'}`}>🍳 Recipes</button>
                        <button onClick={() => setOwnerTab('databases')} className={`w-1/3 py-3 font-bold text-xs uppercase tracking-wider ${ownerTab === 'databases' ? 'border-b-4 border-hunter text-hunter' : 'text-gray-400'}`}>🗄️ Database</button>
                    </div>

                    {ownerTab === 'orders' && (
                        <div className="animate-fade-in mb-12">
                            <h3 className="text-sm font-bold uppercase tracking-widest text-antiqueGold mb-3">Pending Master Requests</h3>
                            {requests.length === 0 ? <div className="bg-white p-6 rounded text-center border shadow-sm text-gray-500 italic">☕ All caught up! No pending staff requests.</div> : 
                                requests.map(req => (
                                    <div key={req.id} className="bg-white rounded-lg shadow-sm border border-yellow-400 mb-4">
                                        <div className="bg-yellow-100 px-4 py-2 flex justify-between items-center rounded-t-lg border-b border-yellow-300">
                                            <span className="font-bold text-hunter text-sm">{req.id}</span>
                                            <span className="text-xs text-yellow-800 font-bold">{req.date}</span>
                                        </div>
                                        <div className="p-2">
                                            {req.items.map((item, idx) => {
                                                const isChecked = selectedItems.some(i => i.reqId === req.id && i.itemIndex === idx);
                                                return (
                                                    <div key={idx} className={`flex items-center justify-between border-b border-gray-100 pb-2 pt-2 last:border-0 px-2 rounded ${isChecked ? 'bg-green-50' : ''}`}>
                                                        <label className="flex items-center space-x-3 cursor-pointer w-[85%]">
                                                            <input type="checkbox" checked={isChecked} onChange={() => handleCheck(req.id, idx, item)} className="w-5 h-5 text-hunter rounded border-gray-300" />
                                                            <div className="flex flex-col">
                                                                <span className="text-sm font-bold text-hunter leading-tight">{item.name}</span>
                                                                <span className="text-xs text-gray-600">{item.qty} {item.unit}</span>
                                                            </div>
                                                        </label>
                                                        <button onClick={() => onRemoveRequestItem(req.id, idx)} className="text-red-400 hover:text-red-600 text-xs font-bold px-2 py-1 bg-white rounded shadow-sm border border-red-100">Del</button>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))
                            }

                            <h3 className="text-sm font-bold uppercase tracking-widest text-antiqueGold mt-8 mb-3">Recent Official POs</h3>
                            {historyPOs.length === 0 ? <div className="bg-white p-4 rounded text-center shadow-sm text-gray-500 italic text-sm">No official POs generated yet.</div> : 
                                historyPOs.map(po => (
                                    <div key={po.id} className={`flex flex-col bg-white p-3 rounded shadow-sm mb-2 border-l-4 relative ${po.status === 'Delivered' ? 'border-green-500' : 'border-blue-500'}`}>
                                        
                                        {/* NEW: RESEND AND DELETE BUTTONS */}
                                        <div className="absolute top-2 right-2 flex space-x-3">
                                            <button onClick={() => onResend(po)} className="text-gray-400 hover:text-green-500 text-lg" title="Resend WhatsApp">🔁</button>
                                            <button onClick={() => onDelete(po.id)} className="text-gray-400 hover:text-red-500 text-lg" title="Delete PO">🗑️</button>
                                        </div>

                                        <div className="flex justify-between items-center mb-1 pr-14">
                                            <div><p className="font-bold text-sm">{po.id}</p><p className="text-xs text-gray-500">{po.supplier}</p></div>
                                            <span className={`text-xs px-2 py-1 rounded font-bold ${po.status === 'Delivered' ? 'bg-green-100 text-green-800' : 'bg-blue-100 text-blue-800'}`}>{po.status}</span>
                                        </div>
                                        {po.status === 'Delivered' && po.receivedItems && (
                                            <div className="mt-2 border-t pt-2">
                                                <p className="text-xs font-bold text-gray-600 mb-1">Receipt Details ({po.deliveryDate}):</p>
                                                <ul className="text-xs space-y-1">
                                                    {po.receivedItems.map((item, idx) => {
                                                        const hasVar = item.qty !== item.receivedQty;
                                                        return <li key={idx} className={`flex justify-between p-1 rounded ${hasVar ? 'bg-red-50 text-red-700 font-bold' : 'text-gray-500'} text-xs`}><span className="truncate pr-2">{item.name}</span><span className="whitespace-nowrap">{hasVar ? `Ord: ${item.qty} → Rec: ${item.receivedQty} ${item.unit}` : `${item.receivedQty} ${item.unit} (OK)`}</span></li>
                                                    })}
                                                </ul>
                                            </div>
                                        )}
                                    </div>
                                ))
                            }
                        </div>
                    )}

                    {ownerTab === 'databases' && (
                        <div className="animate-fade-in">
                            <div className="mb-6 bg-white p-4 rounded-lg shadow-md border border-gray-200">
                                <h3 className="font-bold text-hunter text-sm uppercase tracking-widest mb-2 border-b pb-2">Owner Settings</h3>
                                <label className="block text-xs font-bold text-gray-500 mb-1">WhatsApp Number (For Alerts)</label>
                                <input type="text" className="w-full p-2 border border-gray-300 rounded text-sm bg-gray-50" placeholder="e.g. 9876543210" value={localPhone} onChange={e => setLocalPhone(e.target.value)} onBlur={savePhoneToCloud} />
                            </div>

                            <div className="mb-6 bg-white p-4 rounded-lg shadow-md border border-gray-200">
                                <div className="flex justify-between items-center mb-4 border-b pb-2">
                                    <h3 className="font-bold text-hunter text-sm uppercase tracking-widest">Manage Databases</h3>
                                </div>
                                <div className="flex justify-between items-center mb-5">
                                    <span className="text-sm font-bold text-gray-700">Vendor Directory ({suppliers.length})</span>
                                    <button onClick={addSupplier} className="bg-antiqueGold text-hunter text-xs font-bold py-1 px-3 rounded shadow-sm">+ Add Vendor</button>
                                </div>
                                <div className="border-t pt-3">
                                    <div className="flex justify-between items-center mb-3">
                                        <span className="text-sm font-bold text-gray-700">Inventory Database</span>
                                        <button onClick={handleAddInventoryItem} className="bg-hunter text-parchment text-xs font-bold py-1 px-3 rounded shadow-sm">+ Add Item</button>
                                    </div>
                                    <select value={dbCategory} onChange={e => setDbCategory(e.target.value)} className="w-full p-2 mb-3 border border-gray-300 rounded text-sm bg-gray-50">
                                        {Object.keys(inventory).map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                    </select>
                                    <div className="bg-gray-50 border border-gray-200 rounded max-h-48 overflow-y-auto">
                                        {inventory[dbCategory] && inventory[dbCategory].map(item => (
                                            <div key={item} className="flex justify-between items-center p-2 border-b border-gray-200 last:border-0 hover:bg-gray-100">
                                                <span className="text-xs text-gray-800 truncate pr-2 w-3/4">{item}</span>
                                                <div className="flex space-x-2">
                                                    <button onClick={() => handleEditInventoryItem(item)} className="text-blue-500">✏️</button>
                                                    <button onClick={() => handleDeleteInventoryItem(item)} className="text-red-500">🗑️</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {ownerTab === 'recipes' && (
                        <div className="animate-fade-in">
                            {!isBuildingRecipe ? (
                                <div>
                                    <button onClick={() => setIsBuildingRecipe(true)} className="w-full bg-hunter text-parchment font-bold py-4 rounded shadow-md hover:bg-green-900 transition mb-6 uppercase tracking-wider text-sm flex items-center justify-center">
                                        <span className="text-xl mr-2">+</span> Create New Recipe
                                    </button>

                                    <h3 className="text-sm font-bold uppercase tracking-widest text-antiqueGold mb-3">Kitchen Recipe Book ({recipes.length})</h3>
                                    {recipes.length === 0 ? <div className="bg-white p-6 rounded text-center border shadow-sm text-gray-500 italic">No recipes built yet.</div> : 
                                        recipes.map(recipe => (
                                            <div key={recipe.id} className="bg-white rounded-lg shadow-sm border border-gray-200 p-4 mb-4 relative">
                                                <button onClick={() => deleteRecipe(recipe.id)} className="absolute top-2 right-2 text-gray-400 hover:text-red-500 text-lg">🗑️</button>
                                                <h3 className="font-bold text-hunter text-lg pr-6 mb-2">{recipe.name}</h3>
                                                <div className="bg-gray-50 p-2 rounded mb-3 border border-gray-200">
                                                    <p className="text-xs font-bold text-gray-500 uppercase mb-1">Standard Ingredients:</p>
                                                    <ul className="text-sm">
                                                        {recipe.ingredients.map((ing, i) => (
                                                            <li key={i} className="flex justify-between border-b border-gray-200 last:border-0 py-1">
                                                                <span>{ing.name}</span><span className="font-bold text-hunter">{ing.qty} {ing.unit}</span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                                <p className="text-xs font-bold text-gray-500 uppercase mb-1">Method & Notes:</p>
                                                <p className="text-sm text-gray-700 whitespace-pre-wrap">{recipe.instructions || "No instructions provided."}</p>
                                            </div>
                                        ))
                                    }
                                </div>
                            ) : (
                                <div className="animate-fade-in bg-white p-4 rounded-lg shadow-md border-t-4 border-antiqueGold mb-10">
                                    <div className="flex justify-between items-center mb-4 border-b pb-2">
                                        <h2 className="text-lg font-serif font-bold text-hunter">Recipe Builder</h2>
                                        <button onClick={() => setIsBuildingRecipe(false)} className="text-gray-500 hover:text-red-500 font-bold text-sm">Cancel</button>
                                    </div>
                                    
                                    <label className="block text-xs font-bold text-gray-500 mb-1">Recipe Name</label>
                                    <input type="text" className="w-full p-3 border border-gray-300 rounded mb-4 focus:ring-2 focus:ring-antiqueGold" placeholder="e.g. Classic Iced Latte" value={recipeName} onChange={e => setRecipeName(e.target.value)} />

                                    <label className="block text-xs font-bold text-gray-500 mb-1">Cooking / Prep Instructions</label>
                                    <textarea className="w-full p-3 border border-gray-300 rounded mb-6 focus:ring-2 focus:ring-antiqueGold h-24" placeholder="1. Pull double espresso shot.&#10;2. Add ice... " value={recipeInstructions} onChange={e => setRecipeInstructions(e.target.value)}></textarea>

                                    <h3 className="font-bold text-hunter text-sm uppercase tracking-widest mb-3">Add Standard Ingredients</h3>
                                    
                                    <div className="relative mb-3 shadow-sm">
                                        <span className="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">🔍</span>
                                        <input type="text" className="w-full pl-10 p-2 border border-gray-300 bg-gray-50 rounded" placeholder="Search database..." value={recSearch} onChange={(e) => setRecSearch(e.target.value)}/>
                                    </div>
                                    {!recSearch && (
                                        <div className="flex overflow-x-auto space-x-2 mb-3 pb-2">
                                            {Object.keys(inventory).map(cat => <button key={cat} onClick={() => setRecCat(cat)} className={`whitespace-nowrap px-3 py-1 text-xs rounded-full border ${recCat === cat ? 'bg-hunter text-parchment' : 'bg-white text-hunter border-hunter'}`}>{cat.split(' ')[0]}</button>)}
                                        </div>
                                    )}
                                    <div className="bg-gray-50 border border-gray-200 p-2 mb-6 h-40 overflow-y-auto rounded">
                                        { (recSearch ? [...new Set(Object.values(inventory).flat())].filter(item => item.toLowerCase().includes(recSearch.toLowerCase())) : (inventory[recCat] || [])).map(item => (
                                            <div key={item} className="flex justify-between items-center py-1 border-b border-gray-200 last:border-0">
                                                <span className="text-xs pr-2">{item}</span>
                                                <button onClick={() => openRecAdd(item)} className="text-antiqueGold text-lg font-bold px-2">+</button>
                                            </div>
                                        ))}
                                    </div>

                                    {recipeCart.length > 0 && (
                                        <div className="bg-hunter text-parchment rounded-lg p-3 shadow-sm mb-6">
                                            <h3 className="font-serif font-bold text-md mb-2">Recipe Costing Cart</h3>
                                            {recipeCart.map((item, idx) => (
                                                <div key={idx} className="flex justify-between items-center border-b border-white/20 pb-2 mb-2 last:border-0 last:pb-0 last:mb-0">
                                                    <span className="text-sm">{item.name}</span>
                                                    <div className="flex items-center space-x-3">
                                                        <span className="text-sm font-bold text-antiqueGold">{item.qty} {item.unit}</span>
                                                        <button onClick={() => setRecipeCart(recipeCart.filter((_, i) => i !== idx))} className="text-red-300 text-xs">✕</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    <button onClick={handleSaveRecipe} className="w-full bg-antiqueGold text-hunter font-bold py-3 rounded shadow-md hover:bg-yellow-500 uppercase tracking-wider">
                                        Save Recipe to Cloud
                                    </button>

                                    {showRecAdd && (
                                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
                                            <div className="bg-parchment p-6 rounded-lg shadow-2xl w-full max-w-sm border-2 border-antiqueGold">
                                                <p className="text-sm text-gray-700 mb-4 truncate font-bold">Add: {recModalItem}</p>
                                                <div className="flex space-x-3 mb-6">
                                                    <div className="w-1/2">
                                                        <label className="text-xs font-bold text-gray-500 mb-1">Recipe Qty</label>
                                                        <input type="number" min="0" step="any" autoFocus value={recModalQty} onChange={e=>setRecModalQty(e.target.value)} className="w-full border border-hunter rounded p-2 text-center font-bold" placeholder="0" />
                                                    </div>
                                                    <div className="w-1/2">
                                                        <label className="text-xs font-bold text-gray-500 mb-1">Unit</label>
                                                        <select value={recModalUnit} onChange={e=>setRecModalUnit(e.target.value)} className="w-full border border-hunter rounded p-2 bg-white">
                                                            {units.map(u => <option key={u} value={u}>{u}</option>)}
                                                        </select>
                                                    </div>
                                                </div>
                                                <div className="flex space-x-3">
                                                    <button onClick={() => setShowRecAdd(false)} className="w-1/2 bg-gray-200 text-gray-800 font-bold py-2 rounded">Cancel</button>
                                                    <button onClick={confirmRecAdd} className="w-1/2 bg-antiqueGold text-hunter font-bold py-2 rounded">Add</button>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}

                    {ownerTab === 'orders' && selectedItems.length > 0 && (
                        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-hunter shadow-[0_-5px_15px_rgba(0,0,0,0.15)] p-4 z-50 animate-fade-in">
                            <div className="max-w-md mx-auto flex flex-col space-y-3">
                                <div className="flex justify-between items-center">
                                    <span className="font-bold text-hunter bg-green-100 text-green-800 px-3 py-1 rounded-full text-xs">
                                        {selectedItems.length} items staged for combined PO
                                    </span>
                                    <button onClick={() => setSelectedItems([])} className="text-xs text-red-500 font-bold hover:underline">Clear</button>
                                </div>
                                <select value={selectedVendor} onChange={e => setSelectedVendor(e.target.value)} className="w-full p-3 border border-hunter rounded text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-antiqueGold">
                                    <option value="">-- Choose Vendor Directory --</option>
                                    {suppliers.map(s => <option key={s.name} value={s.name}>{s.name} {s.phone ? `(${s.phone})` : ''}</option>)}
                                </select>
                                <button onClick={handleGeneratePO} className="w-full bg-hunter text-parchment font-bold py-3 rounded shadow-md hover:bg-green-900 transition">
                                    Generate Combined PO & Send
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
