                                {deliveredPOs.length === 0 ? <div className="bg-white/85 backdrop-blur-md p-6 rounded-sm text-center shadow-elegant border border-white/50 text-victorian/60 italic text-sm">No historical deliveries.</div> : 
                                    deliveredPOs.map(po => (
                                        <div key={po.id} className="bg-white/90 backdrop-blur-md p-5 rounded-sm shadow-elegant mb-4 border-l-4 border-l-victorian transition-colors opacity-90 hover:opacity-100">
                                            <div className="flex justify-between items-start">
                                                <div className="flex-1 cursor-pointer" onClick={() => togglePO(po.id)}>
                                                    <p className="font-serif font-bold text-lg text-victorian leading-tight drop-shadow-sm flex items-center">
                                                        <span className="text-xs text-gray-400 mr-2">{expandedPOs[po.id] ? '▼' : '▶'}</span> {po.id}
                                                    </p>
                                                    <p className="text-xs text-gray-600 mt-1 font-medium ml-4">{po.supplier}</p>
                                                </div>
                                                
                                                <div className="flex flex-col items-end space-y-3">
                                                    <span className="text-[9px] px-2.5 py-1 rounded-sm font-bold uppercase tracking-widest shadow-sm bg-victorian text-paper">
                                                        {po.status}
                                                    </span>
                                                    <div className="flex space-x-3">
                                                        <button onClick={(e) => { e.stopPropagation(); onResend(po); }} className="text-gray-400 hover:text-victorian transition-colors text-lg leading-none" title="Resend Records">🔁</button>
                                                        <button onClick={(e) => { e.stopPropagation(); onDelete(po.id); }} className="text-gray-300 hover:text-danger transition-colors text-lg leading-none" title="Delete Record">🗑️</button>
                                                    </div>
                                                </div>
                                            </div>

                                            {expandedPOs[po.id] && (
                                                <div className="animate-fade-in mt-4 pt-4 border-t border-victorian/10">
                                                    <p className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Original Request</p>
                                                    <ul className="text-xs space-y-2 mb-4">
                                                        {po.items.map((item, idx) => (
                                                            <li key={idx} className="flex justify-between text-gray-600 border-b border-gray-100 pb-1 last:border-0">
                                                                <span>{item.name}</span>
                                                                <span className="font-medium">{item.qty} {item.unit}</span>
                                                            </li>
                                                        ))}
                                                    </ul>

                                                    {po.receivedItems && (
                                                        <div className="bg-paper p-3 rounded-sm border border-gray-200">
                                                            <p className="text-[10px] font-bold text-victorian uppercase tracking-widest mb-2">Intake Receipt ({po.deliveryDate})</p>
                                                            <ul className="text-xs space-y-1.5">
                                                                {po.receivedItems.map((item, idx) => {
                                                                    const hasVar = item.qty !== item.receivedQty;
                                                                    const unitCost = item.receivedQty > 0 && item.totalPrice ? (item.totalPrice / item.receivedQty).toFixed(2) : 0;
                                                                    return (
                                                                        <li key={idx} className={`flex justify-between py-1 border-b border-gray-50 last:border-0 ${hasVar ? 'text-danger' : 'text-gray-600'}`}>
                                                                            <span className="truncate pr-2 font-medium">{item.name}</span>
                                                                            <div className="flex flex-col items-end">
                                                                                <span className="whitespace-nowrap font-bold">{hasVar ? `Ord: ${item.qty} → Rec: ${item.receivedQty} ${item.unit}` : `${item.receivedQty} ${item.unit} (OK)`}</span>
                                                                                {item.totalPrice > 0 && <span className="text-[9px] text-victorian/80 mt-0.5 uppercase tracking-widest font-bold">₹{item.totalPrice} (₹{unitCost}/{item.unit})</span>}
                                                                            </div>
                                                                        </li>
                                                                    );
                                                                })}
                                                            </ul>
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    ))
                                }
                            </div>
                        </div>
                    )}

                    {/* OWNER TAB: CONVERSIONS */}
                    {ownerTab === 'conversions' && (
                        <div className="animate-fade-in lg:grid lg:grid-cols-2 lg:gap-8">
                            <div className="lg:col-span-1">
                                <div className="mb-6 shadow-sm bg-white/30 backdrop-blur-sm inline-block p-3 rounded">
                                    <h2 className="text-2xl font-serif font-bold text-victorian mb-2">Prep Kitchen Engine</h2>
                                    <p className="text-sm text-victorian/80 leading-relaxed">Map raw vendor materials to intermediate prepped units (e.g., Beans to Espresso Shots). Staff will only see the final prepped items.</p>
                                </div>
                                
                                <div className="bg-white/85 backdrop-blur-md p-5 rounded-sm shadow-elegant border border-white/60 mb-8 lg:mb-0">
                                    <h3 className="font-bold text-victorian text-xs uppercase tracking-widest mb-4 border-b border-victorian/10 pb-2">
                                        {editingPrepId ? 'Edit Conversion Rule' : 'New Basic Conversion'}
                                    </h3>
                                    <div className="space-y-5">
                                        <div>
                                            <label className="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Prepped Item Name</label>
                                            <input type="text" placeholder="e.g. Filtered Espresso Shot" value={prepName} onChange={e=>setPrepName(e.target.value)} className="w-full p-3 border border-gray-300 rounded-sm text-sm bg-white/90 focus:bg-white" />
                                        </div>
                                        <div className="flex space-x-3 items-center bg-paper/80 p-4 rounded-sm border border-victorian/10">
                                            <span className="text-[10px] font-bold text-victorian uppercase tracking-widest w-16">Yields</span>
                                            <input type="number" placeholder="Qty" value={prepYieldQty} onChange={e=>setPrepYieldQty(e.target.value)} className="w-1/2 p-3 border border-gray-300 rounded-sm text-sm text-center font-bold bg-white" />
                                            <select value={prepYieldUnit} onChange={e=>setPrepYieldUnit(e.target.value)} className="w-1/2 p-3 border border-gray-300 rounded-sm text-sm bg-white font-medium">
                                                {UNITS.map(u => <option key={u} value={u}>{u}</option>)}
                                            </select>
                                        </div>
                                        <div className="flex space-x-3 items-center p-4">
                                            <span className="text-[10px] font-bold text-gray-500 uppercase tracking-widest w-16">From</span>
                                            <input type="number" placeholder="Qty" value={prepRawQty} onChange={e=>setPrepRawQty(e.target.value)} className="w-1/2 p-3 border border-gray-300 rounded-sm text-sm text-center font-bold bg-white" />
                                            <select value={prepRawUnit} onChange={e=>setPrepRawUnit(e.target.value)} className="w-1/2 p-3 border border-gray-300 rounded-sm text-sm bg-white font-medium">
                                                {UNITS.map(u => <option key={u} value={u}>{u}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Source Raw Material</label>
                                            <select value={prepRawItem} onChange={e=>setPrepRawItem(e.target.value)} className="w-full p-3 border border-gray-300 rounded-sm text-sm bg-white font-medium text-gray-700">
                                                <option value="">-- Choose from Catalog --</option>
                                                {allRawNames.map(item => <option key={item} value={item}>{item}</option>)}
                                            </select>
                                        </div>
                                        
                                        <div className="flex space-x-3 mt-2">
                                            {editingPrepId && (
                                                <button onClick={cancelEditPrep} className="w-1/2 bg-white text-gray-600 border border-gray-300 font-bold py-3.5 text-xs uppercase tracking-widest rounded-sm shadow-sm hover:bg-gray-50 transition-colors">
                                                    Cancel
                                                </button>
                                            )}
                                            <button onClick={handleSavePrepItem} className={`${editingPrepId ? 'w-1/2' : 'w-full'} bg-victorian text-antique font-bold py-3.5 text-xs uppercase tracking-widest rounded-sm shadow-md hover:bg-victorianLight transition-colors`}>
                                                {editingPrepId ? 'Update Rule' : 'Save Engine Rule'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-1">
                                <h3 className="text-xs font-bold uppercase tracking-widest text-victorian/70 mb-3 border-b border-victorian/10 pb-2 shadow-sm bg-white/30 backdrop-blur-sm inline-block px-2 rounded">Active Engine Rules ({prepItems.length})</h3>
                                {prepItems.length === 0 ? <p className="text-sm text-victorian/60 italic bg-white/85 backdrop-blur-md p-6 rounded-sm shadow-elegant text-center border border-white/50">No conversion rules set up yet.</p> : 
                                    <div className="bg-white/85 backdrop-blur-md border border-white/60 rounded-sm shadow-elegant overflow-hidden mb-12">
                                        {prepItems.map(p => (
                                            <div key={p.id} className="flex justify-between items-center p-4 border-b border-victorian/5 last:border-0 hover:bg-white transition-colors">
                                                <div className="flex flex-col">
                                                    <span className="text-sm font-bold text-victorian mb-1">{p.name} <span className="text-antique font-serif ml-1">({p.yieldQty} {p.yieldUnit})</span></span>
                                                    <span className="text-xs text-gray-600">Requires: <span className="font-semibold text-gray-800">{p.rawQty} {p.rawUnit}</span> of {p.rawItem}</span>
                                                </div>
                                                <div className="flex space-x-1 ml-2">
                                                    <button onClick={() => handleEditPrepItem(p)} className="text-gray-400 hover:text-victorian p-2 rounded-sm transition-colors text-lg" title="Edit Rule">✏️</button>
                                                    <button onClick={() => handleDeletePrepItem(p.id)} className="text-gray-400 hover:text-danger p-2 rounded-sm transition-colors text-lg" title="Delete Rule">🗑️</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                }
                            </div>
                        </div>
                    )}

                    {/* OWNER TAB: DATABASES */}
                    {ownerTab === 'databases' && (
                        <div className="animate-fade-in lg:grid lg:grid-cols-2 lg:gap-8">
                            <div className="lg:col-span-1 space-y-6">
                                <div className="bg-white/85 backdrop-blur-md p-5 rounded-sm shadow-elegant border border-white/60">
                                    <h3 className="font-bold text-victorian text-xs uppercase tracking-widest mb-4 border-b border-victorian/10 pb-2">System Settings</h3>
                                    <label className="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Owner Alerts (WhatsApp)</label>
                                    <input type="text" className="w-full p-3 border border-gray-300 rounded-sm text-sm bg-white/90 focus:bg-white" placeholder="e.g. 9876543210" value={localPhone} onChange={e => setLocalPhone(e.target.value)} onBlur={savePhoneToCloud} />
                                </div>

                                <div className="bg-white/85 backdrop-blur-md p-5 rounded-sm shadow-elegant border border-white/60">
                                    <h3 className="font-bold text-victorian text-xs uppercase tracking-widest mb-4 border-b border-victorian/10 pb-2">Vendor Directory</h3>
                                    <div className="flex justify-between items-center mb-5">
                                        <span className="text-sm font-medium text-gray-800">{suppliers.length} Active Vendors</span>
                                        <button onClick={addSupplier} className="bg-white border border-antique text-antique text-[10px] font-bold py-1.5 px-3 rounded-sm hover:bg-antique hover:text-victorian transition-colors uppercase tracking-wider shadow-sm">+ Add</button>
                                    </div>
                                    <div className="bg-paper/80 border border-victorian/10 rounded-sm max-h-64 overflow-y-auto mb-2">
                                        {suppliers.length === 0 ? <p className="text-center text-xs py-4 text-gray-500 italic">No vendors found.</p> : 
                                            suppliers.map(vendor => (
                                                <div key={vendor.name} className="flex justify-between items-center p-3 border-b border-victorian/5 last:border-0 hover:bg-white transition-colors">
                                                    <div className="flex flex-col truncate pr-2">
                                                        <span className="text-sm font-bold text-victorian">{vendor.name}</span>
                                                        {vendor.phone && <span className="text-[10px] text-gray-500 font-medium tracking-widest">{vendor.phone}</span>}
                                                    </div>
                                                    <div className="flex space-x-1 shrink-0">
                                                        <button onClick={() => editSupplier(vendor.name)} className="text-gray-400 hover:text-victorian p-1.5 transition-colors">✏️</button>
                                                        <button onClick={() => deleteSupplier(vendor.name)} className="text-gray-400 hover:text-danger p-1.5 transition-colors">🗑️</button>
                                                    </div>
                                                </div>
                                            ))
                                        }
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-1 space-y-6">
                                {/* MASTER PRICE BOOK */}
                                <div className="bg-white/85 backdrop-blur-md p-5 rounded-sm shadow-elegant border border-white/60">
                                    <h3 className="font-bold text-victorian text-xs uppercase tracking-widest mb-4 border-b border-victorian/10 pb-2 flex justify-between items-end">
                                        <span>🧮 Master Price Book</span>
                                    </h3>
                                    
                                    <div className="relative mb-4 shadow-sm">
                                        <span className="absolute inset-y-0 left-0 pl-4 flex items-center text-victorian/40 text-lg">⚲</span>
                                        <input type="text" className="w-full pl-11 p-2.5 border border-gray-300 bg-white/90 rounded-sm text-sm" placeholder="Search raw materials..." value={priceSearchFilter} onChange={(e) => setPriceSearchFilter(e.target.value)}/>
                                    </div>

                                    <div className="bg-paper/80 border border-victorian/10 rounded-sm max-h-[300px] overflow-y-auto">
                                        {allRawNames.filter(item => item.toLowerCase().includes(priceSearchFilter.toLowerCase())).map(item => {
                                            const isEditing = editingPriceItem === item;
                                            const itemPrice = prices[item];
                                            
                                            return (
                                                <div key={item} className={`flex flex-col p-3 border-b border-victorian/5 last:border-0 transition-colors ${isEditing ? 'bg-white shadow-sm' : 'hover:bg-white'}`}>

                                                        <span className="text-sm font-medium text-gray-800 pr-2 truncate">{item}</span>
                                                        {!isEditing && (
                                                            <div className="flex items-center">
                                                                <span className="text-xs font-bold text-antique mr-3">{itemPrice && itemPrice.price ? `₹${itemPrice.price} / ${itemPrice.unit}` : <span className="text-gray-400 italic font-normal">Unpriced</span>}</span>
                                                                <button onClick={() => { setEditingPriceItem(item); setTempPriceVal(itemPrice?.price || ''); setTempPriceUnit(itemPrice?.unit || 'Kg'); }} className="text-gray-400 hover:text-victorian text-sm transition-colors">✏️</button>
                                                            </div>
                                                        )}
                                                    </div>
                                                    
                                                    {isEditing && (
                                                        <div className="flex items-center space-x-2 mt-2">
                                                            <span className="text-sm font-bold text-gray-500">₹</span>
                                                            <input type="number" min="0" step="any" autoFocus value={tempPriceVal} onChange={e=>setTempPriceVal(e.target.value)} className="w-24 p-2 border border-antique rounded-sm text-sm font-bold text-center bg-white" placeholder="Price" />
                                                            <span className="text-xs text-gray-500">per</span>
                                                            <select value={tempPriceUnit} onChange={e=>setTempPriceUnit(e.target.value)} className="p-2 border border-antique rounded-sm text-sm bg-white font-medium">
                                                                {UNITS.map(u => <option key={u} value={u}>{u}</option>)}
                                                            </select>
                                                            <div className="flex-1 flex justify-end space-x-2">
                                                                <button onClick={() => setEditingPriceItem(null)} className="px-2 py-1.5 text-[10px] uppercase font-bold text-gray-500 hover:text-danger border border-transparent rounded-sm transition-colors">Cancel</button>
                                                                <button onClick={() => savePriceItem(item)} className="px-3 py-1.5 text-[10px] uppercase tracking-widest font-bold bg-victorian text-antique rounded-sm transition-colors">Save</button>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}

                                <div className="bg-white/85 backdrop-blur-md p-5 rounded-sm shadow-elegant border border-white/60 h-full">
                                    <h3 className="font-bold text-victorian text-xs uppercase tracking-widest mb-4 border-b border-victorian/10 pb-2">Master Catalog</h3>
                                    <div className="flex justify-between items-center mb-4">
                                        <select value={dbCategory} onChange={e => setDbCategory(e.target.value)} className="w-2/3 p-2.5 border border-gray-300 rounded-sm text-sm bg-paper/90 font-medium">
                                            {Object.keys(inventory).map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                        </select>
                                        <button onClick={handleAddInventoryItem} className="bg-victorian text-antique text-[10px] font-bold py-2.5 px-4 rounded-sm hover:bg-victorianLight transition-colors uppercase tracking-wider shadow-sm">+ Item</button>
                                    </div>
                                    <div className="bg-paper/80 border border-victorian/10 rounded-sm max-h-[500px] overflow-y-auto">
                                        {inventory[dbCategory] && inventory[dbCategory].map(item => (
                                            <div key={item} className="flex justify-between items-center p-3 border-b border-victorian/5 last:border-0 hover:bg-white transition-colors">
                                                <span className="text-sm font-medium text-gray-800 truncate pr-2 w-3/4">{item}</span>
                                                <div className="flex space-x-1">
                                                    <button onClick={() => handleEditInventoryItem(item)} className="text-gray-400 hover:text-victorian p-1.5 transition-colors">✏️</button>
                                                    <button onClick={() => handleDeleteInventoryItem(item)} className="text-gray-400 hover:text-danger p-1.5 transition-colors">🗑️</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* OWNER TAB: RECIPES */}
                    {ownerTab === 'recipes' && (
                        <div className="animate-fade-in lg:grid lg:grid-cols-2 lg:gap-8">
                            
                            {/* LEFT COLUMN: LIST */}
                            <div className="lg:col-span-1">
                                {!isBuildingRecipe && (
                                    <div className="hidden lg:block mb-6 shadow-sm bg-white/30 backdrop-blur-sm p-3 rounded">
                                        <h2 className="text-2xl font-serif font-bold text-victorian">Kitchen Recipe Book</h2>
                                    </div>
                                )}
                                
                                <button onClick={() => { setEditingRecipeId(null); setRecipeName(''); setRecipeCategory(RECIPE_CATEGORIES[0]); setRecipeYieldQty(''); setRecipeInstructions(''); setRecipeCart([]); setIsBuildingRecipe(true); }} className={`w-full bg-victorian/95 backdrop-blur-md text-antique border border-antique/30 font-bold py-4 rounded-sm shadow-elegant hover:bg-victorian transition-colors mb-8 uppercase tracking-widest text-sm flex items-center justify-center ${isBuildingRecipe ? 'hidden' : ''}`}>
                                    <span className="text-lg mr-2 font-light leading-none">+</span> Author New Recipe
                                </button>

                                <div className="relative mb-5 shadow-sm">
                                    <span className="absolute inset-y-0 left-0 pl-4 flex items-center text-victorian/40 text-lg">⚲</span>
                                    <input type="text" className="w-full pl-11 p-3.5 border border-white/50 bg-white/85 backdrop-blur-md rounded-sm text-sm shadow-sm" placeholder="Search the ledger..." value={recipeSearchFilter} onChange={(e) => setRecipeSearchFilter(e.target.value)}/>
                                </div>

                                {!recipeSearchFilter && (
                                    <div className="flex overflow-x-auto space-x-3 mb-8 pb-2 hide-scrollbar">
                                        {['All', ...RECIPE_CATEGORIES].map(cat => (
                                            <button key={cat} onClick={() => setActiveRecipeTab(cat)} className={`whitespace-nowrap px-5 py-2 text-xs uppercase tracking-wider rounded-sm border transition-colors shadow-sm ${activeRecipeTab === cat ? 'bg-victorian text-paper font-bold' : 'bg-white/85 backdrop-blur-md text-victorian border-white/50 hover:bg-white font-medium'}`}>
                                                {cat}
                                            </button>
                                        ))}
                                    </div>
                                )}

                                {displayedRecipes.length === 0 ? <p className="bg-white/85 backdrop-blur-md p-6 rounded-sm text-center shadow-elegant border border-white/50 text-victorian/60 italic text-sm">No recipes found.</p> : 
                                    displayedRecipes.map(recipe => {
                                        // Calculate Total Cost dynamically
                                        let totalRecipeCost = 0;
                                        const rawBreakdownEntries = Object.entries(getRawBreakdown(recipe.ingredients)).map(([name, data]) => {
                                            const cost = convertToCost(data.qty, data.unit, prices[name]);
                                            totalRecipeCost += cost;
                                            return { name, qty: data.qty, unit: data.unit, cost };
                                        });

                                        return (
                                            <div key={recipe.id} className={`bg-white/85 backdrop-blur-md rounded-sm shadow-elegant border ${editingRecipeId === recipe.id ? 'border-antique ring-2 ring-antique/20' : 'border-white/60'} p-5 mb-6 relative transition-all`}>
                                                <div className="absolute top-4 right-4 flex space-x-3">
                                                    <button onClick={() => handleEditRecipe(recipe)} className="text-gray-400 hover:text-victorian transition-colors text-lg" title="Edit Recipe">✏️</button>
                                                    <button onClick={() => deleteRecipe(recipe.id)} className="text-gray-400 hover:text-danger transition-colors text-lg" title="Delete Recipe">🗑️</button>
                                                </div>
                                                
                                                <div className="flex flex-col mb-5 pr-16 border-b border-victorian/10 pb-4">
                                                    <h3 className="font-serif font-bold text-victorian text-xl lg:text-2xl leading-tight">{recipe.name}</h3>
                                                    <div className="flex space-x-2 mt-2">
                                                        <span className="text-[9px] uppercase font-bold tracking-[0.2em] bg-paper/90 text-gray-500 border border-gray-200 px-2 py-1 rounded-sm shadow-sm">{recipe.category || 'Beverages'}</span>
                                                        {recipe.category === 'Batch Prep' && <span className="text-[9px] uppercase font-bold tracking-[0.2em] bg-victorian text-antique border border-antique/20 px-2 py-1 rounded-sm shadow-sm">Yields: {recipe.yieldQty} {recipe.yieldUnit}</span>}
                                                    </div>
                                                </div>
                                                
                                                <div className="flex flex-col space-y-4 mb-6">
                                                    <div className="bg-paper/80 p-4 rounded-sm border border-victorian/10">
                                                        <p className="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-3">Barista Build (Prepped)</p>
                                                        <ul className="text-sm space-y-2">
                                                            {recipe.ingredients.map((ing, i) => (
                                                                <li key={i} className="flex justify-between items-end border-b border-victorian/5 pb-1">
                                                                    <span className="font-medium text-gray-800">{ing.name} {ing.isCustom ? <span className="text-[10px] text-gray-400 font-normal ml-1 italic">(Custom)</span> : ''}</span>
                                                                    <span className="font-bold text-victorian">{ing.qty} {ing.unit}</span>
                                                                </li>
                                                            ))}
                                                        </ul>
                                                    </div>

                                                    <div className="bg-white/90 p-4 rounded-sm border border-antique/30 relative overflow-hidden shadow-sm">
                                                        <div className="absolute top-0 left-0 w-1 h-full bg-antique"></div>
                                                        <div className="flex justify-between items-end mb-3 border-b border-gray-100 pb-2 pl-2">
                                                            <p className="text-[10px] font-bold text-antique uppercase tracking-[0.2em]">Costing Engine (Raw)</p>
                                                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Est. Cost</p>
                                                        </div>
                                                        
                                                        <ul className="text-sm text-gray-800 space-y-2 pl-2 mb-3">
                                                            {rawBreakdownEntries.map((entry, i) => (
                                                                <li key={i} className="flex justify-between items-end border-b border-gray-50 pb-1 last:border-0">
                                                                    <div className="flex flex-col">
                                                                        <span className="font-medium text-gray-700">{entry.name}</span>
                                                                        <span className="text-[10px] text-gray-500 font-bold">{entry.qty && !isNaN(entry.qty) ? parseFloat(entry.qty.toFixed(2)) : 0} {entry.unit || 'units'}</span>
                                                                    </div>
                                                                    <span className="font-bold text-victorian">₹{entry.cost.toFixed(2)}</span>
                                                                </li>
                                                            ))}
                                                        </ul>
                                                        
                                                        <div className="pl-2 pt-3 border-t border-antique/30 flex justify-between items-end bg-antiqueLight/10 rounded-sm p-2">
                                                            <span className="text-xs font-bold text-victorian uppercase tracking-widest">Total Food Cost:</span>
                                                            <span className="text-lg font-bold text-victorian">₹{totalRecipeCost.toFixed(2)}</span>
                                                        </div>
                                                    </div>
                                                </div>

                                                <p className="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-2">Method & Notes</p>
                                                <div className="text-sm text-gray-800 whitespace-pre-wrap leading-relaxed border-l-2 border-antique/50 pl-3 py-1">
                                                    {recipe.instructions || "Standard preparation."}
                                                </div>
                                            </div>
                                        );
                                    })
                                }
                            </div>

                            {/* RIGHT COLUMN: BUILDER (Desktop) / STACKED (Mobile) */}
                            {isBuildingRecipe && (
                                <div className="lg:col-span-1 lg:sticky lg:top-28 lg:h-[calc(100vh-8rem)]">
                                    <div className="animate-fade-in bg-white/85 backdrop-blur-md p-5 rounded-sm shadow-elegant border-t-4 border-antique mb-10 border-x border-b border-white/50 lg:h-full lg:overflow-y-auto hide-scrollbar">
                                        <div className="flex justify-between items-center mb-6 border-b border-victorian/10 pb-3 sticky top-0 bg-white/95 backdrop-blur-md pt-2 z-10">
                                            <h2 className="text-xl font-serif font-bold text-victorian">{editingRecipeId ? 'Edit Recipe' : 'Recipe Builder'}</h2>
                                            <button onClick={() => { setIsBuildingRecipe(false); setEditingRecipeId(null); }} className="text-gray-400 hover:text-danger text-[10px] font-bold uppercase tracking-widest transition-colors">Cancel</button>
                                        </div>
                                        
                                        <label className="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Recipe Name</label>
                                        <input type="text" className="w-full p-3 border border-gray-300 rounded-sm mb-5 text-sm bg-white/90 focus:bg-white" placeholder="e.g. Classic Iced Latte" value={recipeName} onChange={e => setRecipeName(e.target.value)} />

                                        <label className="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Category</label>
                                        <select value={recipeCategory} onChange={e => setRecipeCategory(e.target.value)} className="w-full p-3 border border-gray-300 rounded-sm mb-5 text-sm bg-white font-bold text-victorian">
                                            {RECIPE_CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                        </select>

                                        {/* BATCH PREP YIELD INPUTS */}
                                        {recipeCategory === 'Batch Prep' && (
                                            <div className="mb-6 bg-paper/90 p-4 rounded-sm border border-victorian/10">
                                                <label className="block text-[10px] font-bold text-victorian uppercase tracking-widest mb-3">Total Yield of this Batch</label>
                                                <div className="flex space-x-3">
                                                    <input type="number" min="0" step="any" placeholder="Qty (e.g. 5000)" value={recipeYieldQty} onChange={e=>setRecipeYieldQty(e.target.value)} className="w-1/2 p-3 border border-gray-300 rounded-sm text-center font-bold text-sm bg-white" />
                                                    <select value={recipeYieldUnit} onChange={e=>setRecipeYieldUnit(e.target.value)} className="w-1/2 p-3 border border-gray-300 rounded-sm bg-white font-medium text-sm text-gray-700">
                                                        {units.map(u => <option key={u} value={u}>{u}</option>)}
                                                    </select>
                                                </div>
                                                <p className="text-[10px] text-gray-500 mt-3 font-medium">When saved, this will become an ingredient available for other recipes.</p>
                                            </div>
                                        )}

                                        <label className="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Instructions</label>
                                        <textarea className="w-full p-3 border border-gray-300 rounded-sm mb-8 text-sm h-28 leading-relaxed bg-white/90 focus:bg-white" placeholder="1. Pull double espresso shot.&#10;2. Add ice... " value={recipeInstructions} onChange={e => setRecipeInstructions(e.target.value)}></textarea>

                                        <div className="flex justify-between items-end mb-4 border-b border-victorian/10 pb-2">
                                            <h3 className="font-bold text-victorian text-xs uppercase tracking-widest">Build Composition</h3>
                                            <button onClick={openCustomRecAdd} className="text-[10px] bg-white border border-gray-300 text-gray-600 font-bold px-3 py-1.5 rounded-sm hover:bg-paper transition-colors uppercase tracking-widest shadow-sm">+ Custom/Water</button>
                                        </div>
                                        
                                        <div className="relative mb-4 shadow-sm">
                                            <span className="absolute inset-y-0 left-0 pl-4 flex items-center text-victorian/40 text-lg">⚲</span>
                                            <input type="text" className="w-full pl-11 p-3 border border-gray-300 bg-white/90 rounded-sm text-sm" placeholder="Search catalog..." value={recSearch} onChange={(e) => setRecSearch(e.target.value)}/>
                                        </div>
                                        
                                        {!recSearch && (
                                            <div className="flex overflow-x-auto space-x-2 mb-4 pb-2 hide-scrollbar">
                                                <button onClick={() => setRecCat('Batch Preps')} className={`whitespace-nowrap px-4 py-1.5 text-[10px] uppercase tracking-wider rounded-sm border font-bold transition-colors shadow-sm ${recCat === 'Batch Preps' ? 'bg-victorian text-antique border-victorian' : 'bg-white text-victorian border-gray-200 hover:border-gray-400'}`}>Batch Preps</button>
                                                <button onClick={() => setRecCat('Basic Preps')} className={`whitespace-nowrap px-4 py-1.5 text-[10px] uppercase tracking-wider rounded-sm border font-bold transition-colors shadow-sm ${recCat === 'Basic Preps' ? 'bg-victorianLight text-antique border-victorianLight' : 'bg-white text-victorianLight border-gray-200 hover:border-gray-400'}`}>Engine Rules</button>
                                                {Object.keys(inventory).map(cat => <button key={cat} onClick={() => setRecCat(cat)} className={`whitespace-nowrap px-4 py-1.5 text-[10px] uppercase tracking-wider rounded-sm border transition-colors shadow-sm ${recCat === cat ? 'bg-gray-800 text-white border-gray-800 font-bold' : 'bg-white text-gray-600 border-gray-200 font-medium hover:border-gray-400'}`}>{cat.split(' ')[0]}</button>)}
                                            </div>
                                        )}
                                        
                                        <div className="bg-paper/80 border border-victorian/10 p-2 mb-8 h-48 overflow-y-auto rounded-sm">
                                            { (recSearch ? allRecipeIngredients.filter(item => item.toLowerCase().includes(recSearch.toLowerCase())) : (recCat === 'Batch Preps' ? allBatchPreps : recCat === 'Basic Preps' ? allBasicPreps : (inventory[recCat] || []))).map(item => (
                                                <div key={item} className="flex justify-between items-center py-2 px-3 border-b border-victorian/5 last:border-0 hover:bg-white transition-colors">
                                                    <span className="text-xs font-medium text-gray-800">{item}</span>
                                                    <button onClick={() => openRecAdd(item)} className="text-antique text-2xl font-light hover:text-victorian transition-colors leading-none drop-shadow-sm">+</button>
                                                </div>
                                            ))}
                                            {((recSearch ? allRecipeIngredients.filter(item => item.toLowerCase().includes(recSearch.toLowerCase())) : (recCat === 'Batch Preps' ? allBatchPreps : recCat === 'Basic Preps' ? allBasicPreps : (inventory[recCat] || []))).length === 0) && (
                                                <div className="text-center py-6 text-xs text-gray-400 italic">No items found in this view.</div>
                                            )}
                                        </div>

                                        {recipeCart.length > 0 && (
                                            <div className="bg-victorian/95 backdrop-blur-md text-paper rounded-sm p-5 shadow-elegant mb-8 border-t-2 border-antique">
                                                <h3 className="font-serif font-bold text-lg mb-4 text-antique">Recipe Staging</h3>
                                                <div className="space-y-3">
                                                    {recipeCart.map((item, idx) => (
                                                        <div key={idx} className="flex justify-between items-center border-b border-white/10 pb-2 last:border-0 last:pb-0">
                                                            <div className="flex flex-col">
                                                                <span className="text-sm font-medium">{item.name}</span>
                                                                {item.isCustom && <span className="text-[9px] text-gray-400 uppercase tracking-widest mt-0.5">Non-Inventory</span>}
                                                            </div>
                                                            <div className="flex items-center space-x-4">
                                                                <span className="text-sm font-bold text-antique">{item.qty} {item.unit}</span>
                                                                <button onClick={() => setRecipeCart(recipeCart.filter((_, i) => i !== idx))} className="text-gray-400 hover:text-danger text-[10px] font-bold uppercase tracking-widest transition-colors bg-white/10 px-2 py-1 rounded-sm">✕</button>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        <button onClick={handleSaveRecipe} className="w-full bg-antique text-victorian font-bold py-4 rounded-sm shadow-md hover:bg-antiqueLight transition-colors uppercase tracking-widest text-xs sticky bottom-0 z-10">
                                            {editingRecipeId ? 'Commit Changes' : 'Publish to Ledger'}
                                        </button>

                                        {showRecAdd && (
                                            <div className="fixed inset-0 bg-victorian/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
                                                <div className="bg-paper p-6 rounded-sm shadow-2xl w-full max-w-sm border border-antique">
                                                    
                                                    {isCustomRecItem ? (
                                                        <div className="mb-6">
                                                            <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block">Custom Name</label>
                                                            <input type="text" autoFocus value={recModalItem} onChange={e=>setRecModalItem(e.target.value)} className="w-full border border-gray-300 rounded-sm p-3 font-bold text-sm bg-white" placeholder="e.g. Filtered Water" />
                                                        </div>
                                                    ) : (
                                                        <p className="text-sm text-gray-800 mb-6 truncate font-medium border-b border-gray-200 pb-3">{recModalItem}</p>
                                                    )}

                                                    <div className="flex space-x-4 mb-8">
                                                        <div className="w-1/2">
                                                            <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block">Recipe Qty</label>
                                                            <input type="number" min="0" step="any" autoFocus={!isCustomRecItem} value={recModalQty} onChange={e=>setRecModalQty(e.target.value)} className="w-full border border-gray-300 rounded-sm p-3 text-center font-bold text-lg bg-white" placeholder="0" />
                                                        </div>
                                                        <div className="w-1/2">
                                                            <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block">Unit</label>
                                                            <select value={recModalUnit} onChange={e=>setRecModalUnit(e.target.value)} className="w-full border border-gray-300 rounded-sm p-3 text-lg bg-white font-medium text-gray-700">
                                                                {units.map(u => <option key={u} value={u}>{u}</option>)}
                                                            </select>
                                                        </div>
                                                    </div>
                                                    <div className="flex space-x-3">
                                                        <button onClick={() => setShowRecAdd(false)} className="w-1/2 bg-white border border-gray-300 text-gray-600 font-bold py-3 text-xs uppercase tracking-widest rounded-sm hover:bg-gray-50 transition-colors">Cancel</button>
                                                        <button onClick={confirmRecAdd} className="w-1/2 bg-victorian text-antique border border-antique/30 font-bold py-3 text-xs uppercase tracking-widest rounded-sm hover:bg-victorianLight transition-colors">Add</button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* OWNER TAB: BOTTOM ORDER DISPATCH (Now docked right on Desktop) */}
                    {ownerTab === 'orders' && selectedItems.length > 0 && (
                        <div className="fixed bottom-0 left-0 right-0 bg-paper border-t-2 border-victorian shadow-[0_-8px_30px_rgba(19,42,27,0.15)] p-5 z-50 animate-fade-in lg:left-auto lg:w-96 lg:right-8 lg:bottom-8 lg:rounded-sm lg:border lg:border-victorian lg:shadow-2xl">
                            <div className="max-w-md mx-auto flex flex-col space-y-4">
                                <div className="flex justify-between items-center">
                                    <span className="font-bold text-victorian bg-antiqueLight/30 border border-antique px-3 py-1.5 rounded-sm text-[10px] uppercase tracking-widest">
                                        {selectedItems.length} Staged Items
                                    </span>
                                    <button onClick={() => setSelectedItems([])} className="text-[10px] text-gray-400 font-bold hover:text-danger uppercase tracking-widest transition-colors">Clear</button>
                                </div>
                                <select value={selectedVendor} onChange={e => setSelectedVendor(e.target.value)} className="w-full p-3.5 border border-victorian rounded-sm text-sm bg-white font-bold text-victorian">
                                    <option value="">-- Assign Vendor --</option>
                                    {suppliers.map(s => <option key={s.name} value={s.name}>{s.name} {s.phone ? `(${s.phone})` : ''}</option>)}
                                </select>
                                <button onClick={handleGeneratePO} className="w-full bg-victorian text-antique font-bold py-4 rounded-sm shadow-md hover:bg-victorianLight transition-colors uppercase tracking-widest text-xs">
                                    Dispatch Official PO
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
