<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Caffeine Ministry - PO System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#132A1B">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        paper: '#FAF8F5', 
                        victorian: '#132A1B', 
                        victorianLight: '#23452F',
                        antique: '#D4AF37',
                        antiqueLight: '#F2DF96',
                        danger: '#8B2626',
                        dangerLight: '#FCE8E8'
                    },
                    fontFamily: { 
                        serif: ['"Playfair Display"', 'serif'], 
                        sans: ['"Inter"', 'system-ui', 'sans-serif'] 
                    },
                    boxShadow: {
                        'elegant': '0 8px 32px -4px rgba(19, 42, 27, 0.1)',
                        'float': '0 -4px 24px -4px rgba(19, 42, 27, 0.15)'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #FAF8F5; color: #132A1B; font-family: 'Inter', sans-serif; margin: 0; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input[type="text"], input[type="number"], select, textarea { transition: all 0.2s ease-in-out; }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: #D4AF37 !important; box-shadow: 0 0 0 1px #D4AF37 !important;
        }

        /* --- DYNAMIC THEMATIC BACKGROUNDS --- */
        .bg-theme-orders {
            background-image: linear-gradient(rgba(250, 248, 245, 0.60), rgba(250, 248, 245, 0.75)), url('./DSC_8017.jpg');
            background-size: cover; background-attachment: fixed; background-position: center;
        }
        .bg-theme-recipes {
            background-image: linear-gradient(rgba(250, 248, 245, 0.60), rgba(250, 248, 245, 0.75)), url('./DSC_8052.jpg');
            background-size: cover; background-attachment: fixed; background-position: center;
        }
        .bg-theme-conversions {
            background-image: linear-gradient(rgba(250, 248, 245, 0.60), rgba(250, 248, 245, 0.75)), url('./DSC_8038.jpg');
            background-size: cover; background-attachment: fixed; background-position: center;
        }
        .bg-theme-databases {
            background-image: linear-gradient(rgba(250, 248, 245, 0.60), rgba(250, 248, 245, 0.75)), url('./DSC_8017.jpg');
            background-size: cover; background-attachment: fixed; background-position: center;
        }

        @keyframes alert-flash {
            0%, 100% { border-color: rgba(212, 175, 55, 0.4); box-shadow: 0 4px 15px rgba(212, 175, 55, 0.1); background-color: rgba(255, 255, 255, 0.95); }
            50% { border-color: rgba(212, 175, 55, 1); box-shadow: 0 0 25px rgba(212, 175, 55, 0.6); background-color: rgba(250, 248, 245, 1); }
        }
        .animate-alert-flash { animation: alert-flash 2s infinite ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAcE76Pc46oOJ3FMqb4kcojbvq5ACPuwaE",
            authDomain: "tcm-orders.firebaseapp.com",
            projectId: "tcm-orders",
            storageBucket: "tcm-orders.firebasestorage.app",
            messagingSenderId: "994764639663",
            appId: "1:994764639663:web:2b0a682f2cb1001d37335a",
            measurementId: "G-PLG3WH801B"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        const DEFAULT_SUPPLIERS = [
            { "name": "Rare Beans Company", "phone": "8619122260" }, { "name": "Aditya Industries", "phone": "9595711611" },
            { "name": "Renu Devi & Sons", "phone": "7737840411" }, { "name": "Cash Purchase", "phone": "" }
        ];

        const DEFAULT_INVENTORY = {
            "Fruits and Vegetables": ["Apple (सेव)", "Avocado (अवोकेडो)", "Banana (केले)", "Broccoli (ब्रोकली)", "Tomato (टमाटर) (Grevy)", "Garlic (लहसुन) (Peeled)", "Onion (प्याज़) (Big)"],
            "Coffee and Matcha": ["Full House Green (Arabica Coffee)", "Baarbara Green (Cold Brew)", "Matcha (Premium Grade)"],
            "Groceries": ["Aata", "Amul Butter", "Amul Cheese Slice (Large Pack)", "Amul Cream", "Sugar", "Tata Salt", "Milk (Full Cream)", "Olive Oil (Extra Virgin) (1 ltr)"],
            "Packing and Consumables": ["Brown Paper Bag", "Hot coffee cup (180 ML)", "Pizza Boxes"]
        };
        
        const UNITS = ["Kg", "gms", "Piece", "Pkt", "Jar", "Carton", "Tin", "bunch", "Ltr", "ml", "tsp", "tbsp"];
        const RECIPE_CATEGORIES = ["Beverages", "Kitchen", "Desserts", "Batch Prep"]; 

        function App() {
            const [role, setRole] = useState('staff'); 
            const [loading, setLoading] = useState(true);

            const [staffTab, setStaffTab] = useState('order'); 
            const [ownerTab, setOwnerTab] = useState('orders'); 
            
            const [requests, setRequests] = useState([]); 
            const [pos, setPos] = useState([]); 
            const [poCounter, setPoCounter] = useState({ month: '', count: 1 });
            const [suppliers, setSuppliers] = useState([]);
            const [inventory, setInventory] = useState(DEFAULT_INVENTORY);
            const [prepItems, setPrepItems] = useState([]); 
            const [ownerPhone, setOwnerPhone] = useState('');
            const [recipes, setRecipes] = useState([]); 
            const [prices, setPrices] = useState({}); 

            useEffect(() => {
                let unsubSettings = () => {};
                let unsubReqs = () => {};
                let unsubPOs = () => {};
                let unsubRecipes = () => {};

                const initializeDB = async () => {
                    const settingsRef = db.collection('settings').doc('main');
                    const docSnap = await settingsRef.get();
                    
                    if (!docSnap.exists) {
                        const now = new Date();
                        const initialMonth = `${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getFullYear()).slice(-2)}`;
                        await settingsRef.set({
                            suppliers: DEFAULT_SUPPLIERS,
                            inventory: DEFAULT_INVENTORY,
                            prepItems: [],
                            poCounter: { month: initialMonth, count: 1 },
                            ownerPhone: '',
                            prices: {}
                        });
                    }

                    unsubSettings = settingsRef.onSnapshot(doc => {
                        if (doc.exists) {
                            const data = doc.data();
                            
                            const rawInv = data.inventory || DEFAULT_INVENTORY;
                            const scrubbedInv = {};
                            Object.keys(rawInv).forEach(key => { scrubbedInv[key] = [...new Set(rawInv[key])]; });

                            setSuppliers(data.suppliers || DEFAULT_SUPPLIERS);
                            setInventory(scrubbedInv);
                            setPrepItems(data.prepItems || []);
                            setPoCounter(data.poCounter);
                            setOwnerPhone(data.ownerPhone || '');
                            setPrices(data.prices || {}); 
                        }
                    });

                    unsubReqs = db.collection('requests').onSnapshot(snap => {
                        const reqData = [];
                        snap.forEach(d => reqData.push(d.data()));
                        setRequests(reqData.sort((a,b) => String(b.id).localeCompare(String(a.id)))); 
                    });

                    unsubPOs = db.collection('pos').onSnapshot(snap => {
                        const poData = [];
                        snap.forEach(d => poData.push(d.data()));
                        setPos(poData.sort((a,b) => String(b.id).localeCompare(String(a.id))));
                    });

                    unsubRecipes = db.collection('recipes').onSnapshot(snap => {
                        const recData = [];
                        snap.forEach(d => recData.push(d.data()));
                        setRecipes(recData.sort((a,b) => String(a.name).localeCompare(String(b.name))));
                    });

                    setLoading(false);
                };

                initializeDB();
                return () => { unsubSettings(); unsubReqs(); unsubPOs(); unsubRecipes(); };
            }, []);

            // Centralized Smart Unit Converter
            const convertToCost = (qty, fromUnit, priceObj) => {
                if (!priceObj || !priceObj.price || isNaN(priceObj.price)) return 0;
                let factor = 1;
                const pUnit = priceObj.unit;
                
                if (fromUnit === 'ml' && pUnit === 'Ltr') factor = 0.001;
                if (fromUnit === 'Ltr' && pUnit === 'ml') factor = 1000;
                if (fromUnit === 'gms' && pUnit === 'Kg') factor = 0.001;
                if (fromUnit === 'Kg' && pUnit === 'gms') factor = 1000;
                
                return (Number(qty) * factor) * Number(priceObj.price);
            };

            const generatePONumber = () => {
                const now = new Date();
                const currentMonthYear = `${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getFullYear()).slice(-2)}`;
                let newCount = poCounter.count;
                if (poCounter.month !== currentMonthYear) { newCount = 1; }
                const paddedCount = String(newCount).padStart(3, '0');
                
                db.collection('settings').doc('main').update({ poCounter: { month: currentMonthYear, count: newCount + 1 } });
                return `TCM/${currentMonthYear}/${paddedCount}`;
            };

            const submitMasterRequest = (items) => {
                const reqId = 'REQ-' + Math.floor(1000 + Math.random() * 9000);
                const newReq = { id: reqId, items, date: new Date().toLocaleDateString('en-GB') };
                db.collection('requests').doc(reqId).set(newReq);
                
                if (ownerPhone && ownerPhone.trim() !== '') {
                    const itemList = items.map((i, index) => `${index + 1}. ${i.name} — ${i.qty} ${i.unit}`).join('\n');
                    const message = `*New Master Request: ${reqId}*\n\nHello, the staff has prepared a new order list.\n\n*Items Requested:*\n${itemList}\n\nPlease check the TCM Dashboard.`;
                    let phoneStr = ownerPhone.replace(/\D/g, '');
                    if (phoneStr.length === 10) phoneStr = '91' + phoneStr; 
                    window.open(`https://wa.me/${phoneStr}?text=${encodeURIComponent(message)}`, '_blank');
                } else {
                    alert('Master Request sent to Cloud Database!');
                }
            };

            const createCombinedPO = (selectedItems, vendorObj) => {
                const rawPoId = generatePONumber();
                const safeDbId = rawPoId.replace(/\//g, '-');
                const newPo = { id: rawPoId, supplier: vendorObj.name, supplierPhone: vendorObj.phone, status: 'Approved', date: new Date().toLocaleDateString('en-GB') };

                const combinedItems = [];
                selectedItems.forEach(si => {
                    const item = si.item;
                    const existing = combinedItems.find(i => i.name === item.name && i.unit === item.unit);
                    if (existing) existing.qty = Number(existing.qty) + Number(item.qty);
                    else combinedItems.push({...item, qty: Number(item.qty)});
                });
                newPo.items = combinedItems;
                db.collection('pos').doc(safeDbId).set(newPo);

                const reqsToUpdate = {};
                selectedItems.forEach(si => {
                    if (!reqsToUpdate[si.reqId]) reqsToUpdate[si.reqId] = [];
                    reqsToUpdate[si.reqId].push(si.itemIndex);
                });

                Object.keys(reqsToUpdate).forEach(reqId => {
                    const req = requests.find(r => r.id === reqId);
                    if (req) {
                        const indicesToRemove = reqsToUpdate[reqId];
                        const remaining = req.items.filter((_, idx) => !indicesToRemove.includes(idx));
                        if (remaining.length === 0) db.collection('requests').doc(reqId).delete();
                        else db.collection('requests').doc(reqId).update({ items: remaining });
                    }
                });
                sendWhatsApp(newPo);
            };

            const receivePO = (poId, receivedItemsData) => {
                const safeDbId = poId.replace(/\//g, '-');
                
                db.collection('pos').doc(safeDbId).update({ 
                    status: 'Delivered', 
                    receivedItems: receivedItemsData, 
                    deliveryDate: new Date().toLocaleDateString('en-GB') 
                });

                const newPrices = { ...prices };
                let pricesUpdated = false;

                receivedItemsData.forEach(item => {
                    if (item.receivedQty > 0 && item.totalPrice && Number(item.totalPrice) > 0) {
                        const unitPrice = Number(item.totalPrice) / Number(item.receivedQty);
                        newPrices[item.name] = { 
                            price: Number(unitPrice.toFixed(2)), 
                            unit: item.unit 
                        };
                        pricesUpdated = true;
                    }
                });

                if (pricesUpdated) {
                    db.collection('settings').doc('main').update({ prices: newPrices });
                    alert('Delivery intake logged & Master Price Book auto-updated!');
                } else {
                    alert('Delivery intake logged successfully!');
                }
            };

            const deletePO = (poId) => {
                if(window.confirm("Permanently delete this official PO?")) {
                    const safeDbId = poId.replace(/\//g, '-');
                    db.collection('pos').doc(safeDbId).delete();
                }
            };

            const removeRequestItem = (reqId, itemIndex) => {
                if(!window.confirm("Remove this item from the request?")) return;
                const req = requests.find(r => r.id === reqId);
                const remaining = req.items.filter((_, idx) => idx !== itemIndex);
                if (remaining.length === 0) db.collection('requests').doc(reqId).delete();
                else db.collection('requests').doc(reqId).update({ items: remaining });
            };

            const sendWhatsApp = (po) => {
                if(po.supplier === "Cash Purchase") return alert("Internal Cash Purchase PO generated.");
                const itemList = po.items.map((i, index) => `${index + 1}. ${i.name} — ${i.qty} ${i.unit}`).join('\n');
                
                const isResend = po.status === 'Delivered';
                const prefix = isResend ? `*[RESENT FOR RECORDS]*\n` : ``;

                const message = `${prefix}*Subject:* Purchase Order - The Caffeine Ministry\n*PO Number:* ${po.id}\n*Date:* ${po.date}\n\nHello ${po.supplier},\nPlease arrange the delivery of the following items:\n\n*Order Details:*\n${itemList}\n\n*Delivery Address:*\nThe Caffeine Ministry \n'PARASUDAI', 672, 12th C Road, \nSardarpura, Jodhpur\n\nThank you,\nTeam Caffeine Ministry`;
                let url = `https://wa.me/`;
                if (po.supplierPhone) {
                    let phoneStr = po.supplierPhone.replace(/\D/g, '');
                    if (phoneStr.length === 10) phoneStr = '91' + phoneStr; 
                    url += `${phoneStr}?text=${encodeURIComponent(message)}`;
                } else url += `?text=${encodeURIComponent(message)}`;
                window.open(url, '_blank');
            };

            const addSupplier = () => {
                const name = window.prompt("Enter new Vendor Name:");
                if (!name || name.trim() === '') return;
                const phone = window.prompt("Enter Vendor Mobile Number (Optional):");
                const newSuppliers = [...suppliers, { name: name.trim(), phone: phone ? phone.trim() : "" }];
                db.collection('settings').doc('main').update({ suppliers: newSuppliers });
            };

            const editSupplier = (oldName) => {
                const vendor = suppliers.find(s => s.name === oldName);
                if (!vendor) return;
                const newName = window.prompt("Edit Vendor Name:", vendor.name);
                if (!newName || newName.trim() === '') return;
                const newPhone = window.prompt("Edit Vendor Mobile Number (Optional):", vendor.phone);
                
                const updatedSuppliers = suppliers.map(s => 
                    s.name === oldName ? { name: newName.trim(), phone: newPhone ? newPhone.trim() : "" } : s
                );
                db.collection('settings').doc('main').update({ suppliers: updatedSuppliers });
            };

            const deleteSupplier = (name) => {
                if(window.confirm(`Are you sure you want to delete vendor "${name}"?`)){
                    const updatedSuppliers = suppliers.filter(s => s.name !== name);
                    db.collection('settings').doc('main').update({ suppliers: updatedSuppliers });
                }
            };

            const handleSwitchRole = () => {
                if (role === 'staff') {
                    const pin = window.prompt("Enter 6-digit Owner PIN:");
                    if (pin === "170117") setRole('owner'); 
                    else if (pin !== null) alert("Incorrect PIN.");
                } else setRole('staff');
            };

            if (loading) return (
                <div className="min-h-screen bg-paper flex flex-col items-center justify-center font-serif text-victorian">
                    <img src="TCM logo.png" alt="TCM Logo" className="h-32 w-32 object-cover rounded-full border-4 border-antique mb-6 shadow-elegant animate-pulse" />
                    <h1 className="text-base sm:text-lg font-bold tracking-widest uppercase mb-1">The Caffeine Ministry</h1>
                    <p className="text-[10px] sm:text-xs text-antique font-sans tracking-[0.2em] uppercase font-bold">A Ministry of Fine Coffee & Cuisine</p>
                </div>
            );

            let bgThemeClass = 'bg-theme-orders';
            if (role === 'staff') {
                if (staffTab === 'order') bgThemeClass = 'bg-theme-orders';
                if (staffTab === 'recipes') bgThemeClass = 'bg-theme-recipes';
            } else {
                if (ownerTab === 'orders') bgThemeClass = 'bg-theme-orders';
                if (ownerTab === 'recipes') bgThemeClass = 'bg-theme-recipes';
                if (ownerTab === 'conversions') bgThemeClass = 'bg-theme-conversions';
                if (ownerTab === 'databases') bgThemeClass = 'bg-theme-databases';
            }

            return (
                <div className={`min-h-screen pb-24 lg:pb-0 transition-all duration-700 ease-in-out ${bgThemeClass}`}>
                    <header className="bg-victorian/95 backdrop-blur-md text-paper p-4 shadow-elegant sticky top-0 z-50 border-b border-antique">
                        <div className="flex justify-between items-center max-w-6xl mx-auto px-2 lg:px-6">
                            <div className="flex items-center space-x-3">
                                <img src="TCM logo.png" alt="TCM Logo" className="h-10 w-10 sm:h-12 sm:w-12 object-cover rounded-full border border-antique/50 shadow-sm" />
                                <div className="flex flex-col">
                                    <h1 className="text-[13px] sm:text-base lg:text-xl font-serif font-bold tracking-wider uppercase leading-tight text-white drop-shadow-sm">The Caffeine Ministry</h1>
                                    <p className="text-[8px] sm:text-[10px] lg:text-xs text-antique uppercase tracking-[0.1em] font-sans mt-0.5 font-bold">A Ministry of Fine Coffee & Cuisine</p>
                                </div>
                            </div>
                            <button onClick={handleSwitchRole} className="bg-transparent border border-antique text-antique text-[10px] sm:text-xs lg:text-sm font-bold py-1.5 lg:py-2 px-3.5 lg:px-5 rounded-sm hover:bg-antique hover:text-victorian transition-colors uppercase tracking-wider whitespace-nowrap">
                                {role === 'staff' ? 'Login' : 'Log Out'}
                            </button>
                        </div>
                    </header>
                    <main className="max-w-6xl mx-auto lg:flex lg:gap-8 lg:mt-8 px-4 lg:px-6">
                        {role === 'owner' && (
                            <aside className="hidden lg:block w-64 shrink-0">
                                <div className="bg-white/90 backdrop-blur-md rounded-sm shadow-elegant border border-white/60 p-4 sticky top-28">
                                    <h3 className="font-serif font-bold text-lg text-victorian mb-4 border-b border-victorian/10 pb-2">Owner Dashboard</h3>
                                    <div className="flex flex-col space-y-2">
                                        {['orders', 'recipes', 'conversions', 'databases'].map(tab => (
                                            <button key={tab} onClick={() => setOwnerTab(tab)} className={`w-full text-left px-4 py-3 font-bold text-xs uppercase tracking-widest rounded-sm transition-all ${ownerTab === tab ? 'bg-victorian text-paper shadow-sm' : 'text-gray-500 hover:bg-paper hover:text-victorian'}`}>
                                                {tab === 'databases' ? 'Database Mgmt' : tab}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </aside>
                        )}
                        <div className={`flex-1 ${role === 'staff' ? 'max-w-md mx-auto mt-6' : 'mt-6 lg:mt-0'}`}>
                            {role === 'staff' ? 
                                <StaffView inventory={inventory} units={UNITS} onSubmit={submitMasterRequest} pos={pos} onReceive={receivePO} requests={requests} recipes={recipes} prepItems={prepItems} staffTab={staffTab} setStaffTab={setStaffTab} prices={prices} convertToCost={convertToCost} /> : 
                                <OwnerView requests={requests} pos={pos} onCreateCombinedPO={createCombinedPO} onRemoveRequestItem={removeRequestItem} onDelete={deletePO} onResend={sendWhatsApp} suppliers={suppliers} addSupplier={addSupplier} editSupplier={editSupplier} deleteSupplier={deleteSupplier} inventory={inventory} prepItems={prepItems} ownerPhone={ownerPhone} recipes={recipes} units={UNITS} ownerTab={ownerTab} setOwnerTab={setOwnerTab} prices={prices} convertToCost={convertToCost} />
                            }
                        </div>
                    </main>
                </div>
            );
        }

        // --- STAFF VIEW ---
        function StaffView({ inventory, units, onSubmit, pos, onReceive, requests, recipes, prepItems, staffTab, setStaffTab, prices, convertToCost }) {
            const [cart, setCart] = useState([]);
            const [selectedCategory, setSelectedCategory] = useState(Object.keys(inventory)[0]);
            const [searchTerm, setSearchTerm] = useState('');
            const [receivingPO, setReceivingPO] = useState(null);
            
            const [receivedQuantities, setReceivedQuantities] = useState({});
            const [receivedPrices, setReceivedPrices] = useState({}); 
            const [isScanning, setIsScanning] = useState(false);

            const [recipeSearchFilter, setRecipeSearchFilter] = useState('');
            const [activeRecipeTab, setActiveRecipeTab] = useState('All');

            const [showAddModal, setShowAddModal] = useState(false);
            const [modalItemName, setModalItemName] = useState('');
            const [modalQty, setModalQty] = useState('');
            const [modalUnit, setModalUnit] = useState('Kg');

            const openAddModal = (item) => {
                if (cart.find(i => i.name === item)) return alert("Item is already in your cart.");
                setModalItemName(item); setModalQty(''); setModalUnit('Kg'); setShowAddModal(true);
            };

            const confirmAddItem = () => {
                if(!modalQty || Number(modalQty) <= 0) return alert("Please enter a valid quantity.");
                setCart([...cart, { name: modalItemName, qty: Number(modalQty), unit: modalUnit }]);
                setShowAddModal(false);
            };

            const removeItem = (index) => setCart(cart.filter((_, i) => i !== index));
            const handleSubmit = () => {
                if (cart.length === 0) return alert('Cart is empty.');
                onSubmit(cart); setCart([]); setSearchTerm('');
            };

            const openReceiveScreen = (po) => {
                setReceivingPO(po);
                const initialQty = {};
                const initialPrices = {};
                po.items.forEach((item, idx) => { 
                    initialQty[idx] = item.qty; 
                    initialPrices[idx] = ''; // Blank for manual/AI entry
                });
                setReceivedQuantities(initialQty);
                setReceivedPrices(initialPrices);
            };

            const handleSimulateScan = (e) => {
                if (!e.target.files || e.target.files.length === 0) return;
                setIsScanning(true);
                
                // Simulate the AI OCR network call
                setTimeout(() => {
                    const autoQty = {};
                    const autoPrices = {};
                    
                    receivingPO.items.forEach((item, idx) => {
                        autoQty[idx] = item.qty;
                        const expectedCost = convertToCost(item.qty, item.unit, prices[item.name]);
                        autoPrices[idx] = expectedCost > 0 ? expectedCost.toFixed(2) : (Math.random() * 800 + 100).toFixed(2);
                    });
                    
                    setReceivedQuantities(autoQty);
                    setReceivedPrices(autoPrices);
                    setIsScanning(false);
                    alert("AI Scan Complete: Extracted quantities and invoice prices. Please verify before confirming.");
                }, 2000);
            };

            const submitReceive = () => {
                const receivedItemsData = receivingPO.items.map((item, idx) => ({ 
                    ...item, 
                    receivedQty: Number(receivedQuantities[idx]) || 0,
                    totalPrice: Number(receivedPrices[idx]) || 0 
                }));
                onReceive(receivingPO.id, receivedItemsData);
                setReceivingPO(null);
            };

            let displayedItems = [];
            if (searchTerm.trim() !== '') {
                displayedItems = [...new Set(Object.values(inventory).flat())].filter(item => item.toLowerCase().includes(searchTerm.toLowerCase()));
            } else {
                displayedItems = inventory[selectedCategory] || [];
            }

            const incomingPOs = pos.filter(po => po.status === 'Approved');

            const displayedRecipes = recipes.filter(r => {
                const matchesSearch = r.name.toLowerCase().includes(recipeSearchFilter.toLowerCase());
                const matchesCat = activeRecipeTab === 'All' || (r.category || 'Beverages') === activeRecipeTab;
                return matchesSearch && matchesCat;
            });

            if (receivingPO) {
                return (
                    <div className="animate-fade-in bg-white/85 backdrop-blur-md p-5 rounded-sm shadow-elegant border border-white/50">
                        <div className="flex justify-between items-center mb-5 border-b border-gray-200 pb-3">
                            <h2 className="text-xl font-serif font-bold text-victorian">Delivery Intake</h2>
                            <button onClick={() => setReceivingPO(null)} className="text-danger font-bold text-sm uppercase tracking-wider hover:underline">Cancel</button>
                        </div>
                        <div className="mb-6 bg-paper/90 p-4 rounded-sm border border-gray-200 shadow-sm">
                            <p className="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Purchase Order Reference</p>
                            <p className="font-bold text-victorian text-lg mb-4">{receivingPO.id}</p>
                            
                            <div className="relative">
                                <input type="file" accept="image/*" capture="environment" id="invoice-upload" className="hidden" onChange={handleSimulateScan} />
                                <label htmlFor="invoice-upload" className={`w-full flex justify-center items-center py-3 border rounded-sm text-xs font-bold uppercase tracking-widest cursor-pointer transition-colors ${isScanning ? 'bg-antiqueLight border-antique text-victorian shadow-inner' : 'bg-white border-victorian text-victorian hover:bg-paper shadow-sm'}`}>
                                    {isScanning ? <span className="animate-pulse flex items-center">⏳ Analyzing Document...</span> : '📸 Auto-Scan Invoice (AI)'}
                                </label>
                            </div>
                            <p className="text-[9px] text-gray-500 uppercase tracking-widest mt-3 border-t border-gray-200 pt-2 font-bold leading-tight">Photograph invoice to auto-extract intake data.</p>
                        </div>
                        
                        <div className="mb-6 space-y-3">
                            <div className="flex justify-between text-[10px] font-bold text-gray-400 uppercase tracking-widest pb-2 border-b border-gray-200 space-x-2">
                                <span className="w-2/5">Item Name</span>
                                <span className="w-1/5 text-center">Ord</span>
                                <span className="w-1/5 text-center">Rec</span>
                                <span className="w-1/5 text-center">Inv (₹)</span>
                            </div>
                            {receivingPO.items.map((item, idx) => (
                                <div key={idx} className="flex justify-between items-center py-2 space-x-2 border-b border-gray-100 last:border-0 pb-3">
                                    <span className="text-xs w-2/5 pr-1 font-medium text-gray-800 leading-tight">{item.name}</span>
                                    <span className="text-xs text-center w-1/5 text-gray-500 font-medium leading-tight">{item.qty}<br/><span className="text-[9px]">{item.unit}</span></span>
                                    <input type="number" min="0" step="any" className="w-1/5 border border-gray-300 rounded-sm p-1.5 text-center font-bold text-sm bg-white/90 focus:bg-white" value={receivedQuantities[idx]} onChange={(e) => setReceivedQuantities({...receivedQuantities, [idx]: e.target.value})} />
                                    <input type="number" min="0" step="any" placeholder="₹" className="w-1/5 border border-antique rounded-sm p-1.5 text-center font-bold text-sm bg-white focus:bg-white focus:ring-1 focus:ring-antique" value={receivedPrices[idx]} onChange={(e) => setReceivedPrices({...receivedPrices, [idx]: e.target.value})} />
                                </div>
                            ))}
                        </div>
                        <button onClick={submitReceive} className="w-full bg-victorian text-antique uppercase tracking-widest text-xs font-bold py-4 rounded-sm hover:bg-victorianLight transition-colors shadow-md">Confirm Delivery & Update Prices</button>
                    </div>
                );
            }

            return (
                <div className="animate-fade-in relative">
                    <div className="flex mb-8 border-b-2 border-victorian/20 lg:hidden">
                        <button onClick={() => setStaffTab('order')} className={`w-1/2 py-3 font-bold text-xs uppercase tracking-widest transition-all ${staffTab === 'order' ? 'border-b-2 border-victorian text-victorian -mb-[2px]' : 'text-victorian/50 hover:text-victorian/80'}`}>Draft Order</button>
                        <button onClick={() => setStaffTab('recipes')} className={`w-1/2 py-3 font-bold text-xs uppercase tracking-widest transition-all ${staffTab === 'recipes' ? 'border-b-2 border-victorian text-victorian -mb-[2px]' : 'text-victorian/50 hover:text-victorian/80'}`}>Recipe Book</button>
                    </div>
                    
                    <div className="hidden lg:flex space-x-4 mb-8">
                        <button onClick={() => setStaffTab('order')} className={`px-6 py-3 font-bold text-xs uppercase tracking-widest rounded-sm transition-all border shadow-sm ${staffTab === 'order' ? 'bg-victorian text-paper border-victorian' : 'bg-white/80 text-gray-600 border-white hover:bg-white'}`}>Draft Order</button>
                        <button onClick={() => setStaffTab('recipes')} className={`px-6 py-3 font-bold text-xs uppercase tracking-widest rounded-sm transition-all border shadow-sm ${staffTab === 'recipes' ? 'bg-victorian text-paper border-victorian' : 'bg-white/80 text-gray-600 border-white hover:bg-white'}`}>Recipe Book</button>
                    </div>

                    {/* STAFF VIEW - RECIPES */}
                    {staffTab === 'recipes' && (
                        <div className="animate-fade-in">
                            <div className="relative mb-5 shadow-sm">
                                <span className="absolute inset-y-0 left-0 pl-4 flex items-center text-victorian/40 text-lg">⚲</span>
                                <input type="text" className="w-full pl-11 p-3.5 border border-white/50 bg-white/85 backdrop-blur-md rounded-sm text-sm shadow-sm" placeholder="Search the ledger..." value={recipeSearchFilter} onChange={(e) => setRecipeSearchFilter(e.target.value)}/>
                            </div>

                            {!recipeSearchFilter && (
                                <div className="flex overflow-x-auto space-x-3 mb-8 pb-2 hide-scrollbar">
                                    {['All', ...RECIPE_CATEGORIES].map(cat => (
                                        <button key={cat} onClick={() => setActiveRecipeTab(cat)} className={`whitespace-nowrap px-5 py-2 text-xs uppercase tracking-wider rounded-sm transition-colors shadow-sm ${activeRecipeTab === cat ? 'bg-victorian text-paper font-bold' : 'bg-white/85 backdrop-blur-md text-victorian border border-white/50 font-medium hover:bg-white'}`}>
                                            {cat}
                                        </button>
                                    ))}
                                </div>
                            )}

                            {displayedRecipes.length === 0 ? <p className="text-sm text-victorian/60 italic bg-white/85 backdrop-blur-md p-6 rounded-sm shadow-elegant border border-white/50 text-center">No records found.</p> : 
                                displayedRecipes.map(recipe => (
                                    <div key={recipe.id} className="bg-white/85 backdrop-blur-md rounded-sm shadow-elegant border border-white/60 p-5 mb-5">
                                        <div className="flex justify-between items-start mb-4 border-b border-victorian/10 pb-3">
                                            <h3 className="font-serif font-bold text-victorian text-xl leading-tight pr-2">{recipe.name}</h3>
                                            <span className="text-[9px] uppercase font-bold tracking-[0.2em] bg-paper/80 border border-victorian/10 text-victorian/70 px-2 py-1 rounded-sm whitespace-nowrap mt-1">{recipe.category || 'Beverages'}</span>
                                        </div>
                                        
                                        <div className="flex flex-col space-y-4 mb-5">
                                            <div className="bg-paper/80 p-4 rounded-sm border border-victorian/10">
                                                <p className="text-[10px] font-bold text-victorian/50 uppercase tracking-[0.2em] mb-3">Ingredients</p>
                                                <ul className="text-sm space-y-2">
                                                    {recipe.ingredients.map((ing, i) => (
                                                        <li key={i} className="flex justify-between items-end border-b border-victorian/5 pb-1">
                                                            <span className="font-medium text-victorian/80">{ing.name} {ing.isCustom ? <span className="text-[10px] text-victorian/40 font-normal ml-1 italic">(Custom)</span> : ''}</span>
                                                            <span className="font-bold text-victorian">{ing.qty} {ing.unit}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>

                                        <p className="text-[10px] font-bold text-victorian/50 uppercase tracking-[0.2em] mb-2">Method & Notes</p>
                                        <div className="text-sm text-victorian/80 whitespace-pre-wrap leading-relaxed border-l-2 border-antique pl-3 py-1">
                                            {recipe.instructions || "Standard preparation."}
                                        </div>
                                    </div>
                                ))
                            }
                        </div>
                    )}

                    {/* STAFF VIEW - ORDER */}
                    {staffTab === 'order' && (
                        <div className="animate-fade-in">
                            {showAddModal && (
                                <div className="fixed inset-0 bg-victorian/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
                                    <div className="bg-paper p-6 rounded-sm shadow-2xl w-full max-w-sm border border-antique">
                                        <h3 className="font-serif font-bold text-xl text-victorian mb-1">Add to Request</h3>
                                        <p className="text-sm text-gray-600 mb-6 truncate">{modalItemName}</p>
                                        <div className="flex space-x-4 mb-8">
                                            <div className="w-1/2">
                                                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block">Quantity</label>
                                                <input type="number" min="0" step="any" value={modalQty} onChange={e=>setModalQty(e.target.value)} className="w-full border border-gray-300 rounded-sm p-3 text-center font-bold text-lg bg-white" placeholder="0" />
                                            </div>
                                            <div className="w-1/2">
                                                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block">Unit</label>
                                                <select value={modalUnit} onChange={e=>setModalUnit(e.target.value)} className="w-full border border-gray-300 rounded-sm p-3 text-lg bg-white font-medium text-gray-700">
                                                    {units.map(u => <option key={u} value={u}>{u}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="flex space-x-3">
                                            <button onClick={() => setShowAddModal(false)} className="w-1/2 bg-white border border-gray-300 text-gray-600 font-bold py-3 text-xs uppercase tracking-widest rounded-sm hover:bg-gray-50 transition-colors">Cancel</button>
                                            <button onClick={confirmAddItem} className="w-1/2 bg-victorian text-antique border border-antique/30 font-bold py-3 text-xs uppercase tracking-widest rounded-sm hover:bg-victorianLight transition-colors">Add</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {incomingPOs.length > 0 && (
                                <div className="mb-8 bg-white/90 backdrop-blur-md rounded-sm p-5 animate-alert-flash">
                                    <h3 className="text-xs font-bold uppercase tracking-widest text-victorian mb-4 flex items-center">
                                        <span className="mr-2 text-lg">⚠️</span> Incoming Deliveries
                                    </h3>
                                    {incomingPOs.map(po => (
                                        <div key={po.id} className="bg-paper/80 p-4 rounded-sm border border-victorian/10 mb-3 flex justify-between items-center last:mb-0">
                                            <div>
                                                <p className="font-bold text-sm text-victorian mb-0.5">{po.id}</p>
                                                <p className="text-xs text-gray-600">{po.supplier}</p>
                                            </div>
                                            <button onClick={() => openReceiveScreen(po)} className="bg-white border border-victorian text-victorian text-xs font-bold py-2 px-4 rounded-sm hover:bg-victorian hover:text-paper transition-colors uppercase tracking-wider shadow-sm">Intake</button>
                                        </div>
                                    ))}
                                </div>
                            )}

                            <h2 className="text-xl font-serif font-semibold text-victorian mb-4 shadow-sm backdrop-blur-sm inline-block px-2 rounded bg-white/30">Request Inventory</h2>
                            <div className="relative mb-5 shadow-sm">
                                <span className="absolute inset-y-0 left-0 pl-4 flex items-center text-victorian/40 text-lg">⚲</span>
                                <input type="text" className="w-full pl-11 p-3.5 border border-white/50 bg-white/85 backdrop-blur-md rounded-sm text-sm shadow-sm" placeholder="Search inventory..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}/>
                            </div>

                            {!searchTerm && (
                                <div className="flex overflow-x-auto space-x-3 mb-6 pb-2 hide-scrollbar">
                                    {Object.keys(inventory).map(cat => (
                                        <button key={cat} onClick={() => setSelectedCategory(cat)} className={`whitespace-nowrap px-5 py-2 text-xs uppercase tracking-wider rounded-sm transition-colors shadow-sm ${selectedCategory === cat ? 'bg-victorian text-paper font-bold' : 'bg-white/85 backdrop-blur-md text-victorian border border-white/50 hover:bg-white font-medium'}`}>
                                            {cat.split(' ')[0]}
                                        </button>
                                    ))}
                                </div>
                            )}

                            <div className="bg-white/85 backdrop-blur-md rounded-sm shadow-elegant border border-white/60 p-2 mb-8 max-h-[40vh] overflow-y-auto">
                                {displayedItems.length === 0 ? <p className="text-victorian/50 text-sm text-center py-6 italic">No items found</p> : 
                                    displayedItems.map(item => (
                                        <div key={item} className="flex justify-between items-center py-3 px-3 border-b border-victorian/10 last:border-0 hover:bg-white/90 transition-colors">
                                            <span className="text-sm font-medium text-victorian/90 pr-2">{item}</span>
                                            <button onClick={() => openAddModal(item)} className="text-antique text-2xl font-light hover:text-victorian transition-colors leading-none drop-shadow-sm">+</button>
                                        </div>
                                    ))
                                }
                            </div>

                            {cart.length > 0 && (
                                <div className="bg-victorian/95 backdrop-blur-md text-paper rounded-sm p-6 shadow-elegant mb-6 border-t-4 border-antique">
                                    <div className="flex justify-between items-end mb-5 border-b border-white/10 pb-3">
                                        <h3 className="font-serif font-bold text-xl text-antique">Active Draft</h3>
                                        <span className="text-xs uppercase tracking-widest text-gray-400">{cart.length} items</span>
                                    </div>
                                    
                                    <div className="space-y-3 mb-8">
                                        {cart.map((item, idx) => (
                                            <div key={idx} className="flex justify-between items-center group">
                                                <div className="flex flex-col">
                                                    <span className="text-sm font-medium">{item.name}</span>
                                                    <span className="text-xs text-antique font-bold mt-0.5">{item.qty} {item.unit}</span>
                                                </div>
                                                <button onClick={() => removeItem(idx)} className="text-gray-400 hover:text-danger text-xs uppercase tracking-widest font-bold px-3 py-2 transition-colors">Remove</button>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <button onClick={handleSubmit} className="w-full bg-antique text-victorian font-bold py-4 rounded-sm uppercase tracking-widest text-xs hover:bg-antiqueLight transition-colors shadow-md">
                                        Submit Request to Owner
                                    </button>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // --- OWNER VIEW ---
        function OwnerView({ requests, pos, onCreateCombinedPO, onRemoveRequestItem, onDelete, onResend, suppliers, addSupplier, editSupplier, deleteSupplier, inventory, prepItems, ownerPhone, recipes, units, ownerTab, setOwnerTab, prices, convertToCost }) {
            const activePOs = pos.filter(po => po.status === 'Approved');
            const deliveredPOs = pos.filter(po => po.status === 'Delivered');
            
            const [selectedItems, setSelectedItems] = useState([]);
            const [selectedVendor, setSelectedVendor] = useState('');
            const [dbCategory, setDbCategory] = useState(Object.keys(inventory)[0]);
            const [localPhone, setLocalPhone] = useState(ownerPhone);
            const [expandedPOs, setExpandedPOs] = useState({});

            const [prepName, setPrepName] = useState('');
            const [prepYieldQty, setPrepYieldQty] = useState('');
            const [prepYieldUnit, setPrepYieldUnit] = useState('ml');
            const [prepRawQty, setPrepRawQty] = useState('');
            const [prepRawUnit, setPrepRawUnit] = useState('gms');
            const [prepRawItem, setPrepRawItem] = useState('');
            const [editingPrepId, setEditingPrepId] = useState(null); 

            const [isBuildingRecipe, setIsBuildingRecipe] = useState(false);
            const [editingRecipeId, setEditingRecipeId] = useState(null); 
            const [recipeName, setRecipeName] = useState('');
            const [recipeCategory, setRecipeCategory] = useState(RECIPE_CATEGORIES[0]);
            const [recipeYieldQty, setRecipeYieldQty] = useState(''); 
            const [recipeYieldUnit, setRecipeYieldUnit] = useState('ml'); 
            const [recipeInstructions, setRecipeInstructions] = useState('');
            const [recipeCart, setRecipeCart] = useState([]);
            
            const [recSearch, setRecSearch] = useState('');
            const [recCat, setRecCat] = useState('Batch Preps'); 
            
            const [recipeSearchFilter, setRecipeSearchFilter] = useState('');
            const [activeRecipeTab, setActiveRecipeTab] = useState('All');

            const [showRecAdd, setShowRecAdd] = useState(false);
            const [recModalItem, setRecModalItem] = useState('');
            const [recModalQty, setRecModalQty] = useState('');
            const [recModalUnit, setRecModalUnit] = useState('gms');
            const [isCustomRecItem, setIsCustomRecItem] = useState(false);

            const [editingPriceItem, setEditingPriceItem] = useState(null);
            const [tempPriceVal, setTempPriceVal] = useState('');
            const [tempPriceUnit, setTempPriceUnit] = useState('Kg');
            const [priceSearchFilter, setPriceSearchFilter] = useState('');

            const savePhoneToCloud = () => db.collection('settings').doc('main').update({ ownerPhone: localPhone });

            const togglePO = (id) => {
                setExpandedPOs(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const getRawBreakdown = (ingredients) => {
                const rawTotals = {};

                const processIngredient = (ingName, ingQty) => {
                    const prepMatch = prepItems.find(p => p.name === ingName);
                    const batchMatch = recipes.find(r => r.category === 'Batch Prep' && r.name === ingName);

                    if (batchMatch && batchMatch.yieldQty) {
                        const ratio = Number(ingQty) / Number(batchMatch.yieldQty);
                        batchMatch.ingredients.forEach(subIng => {
                            if (!subIng.isCustom) processIngredient(subIng.name, Number(subIng.qty) * ratio);
                        });
                    } else if (prepMatch) {
                        const ratio = Number(ingQty) / Number(prepMatch.yieldQty);
                        const rawNeeded = ratio * Number(prepMatch.rawQty);
                        if (rawTotals[prepMatch.rawItem]) rawTotals[prepMatch.rawItem].qty += rawNeeded;
                        else rawTotals[prepMatch.rawItem] = { qty: rawNeeded, unit: prepMatch.rawUnit };
                    } else {
                        if (rawTotals[ingName]) rawTotals[ingName].qty += Number(ingQty);
                        else rawTotals[ingName] = { qty: Number(ingQty), unit: 'unit' }; 
                    }
                };

                ingredients.forEach(ing => { if (!ing.isCustom) processIngredient(ing.name, Number(ing.qty)); });
                return rawTotals;
            };

            const handleCheck = (reqId, itemIndex, item) => {
                const isSelected = selectedItems.some(i => i.reqId === reqId && i.itemIndex === itemIndex);
                if (isSelected) setSelectedItems(selectedItems.filter(i => !(i.reqId === reqId && i.itemIndex === itemIndex)));
                else setSelectedItems([...selectedItems, { reqId, itemIndex, item }]);
            };

            const handleGeneratePO = () => {
                if (selectedItems.length === 0) return alert('Check the box next to at least one item.');
                if (!selectedVendor) return alert('Please select a vendor.');
                const vendorObj = suppliers.find(s => s.name === selectedVendor);
                onCreateCombinedPO(selectedItems, vendorObj);
                setSelectedItems([]); setSelectedVendor('');
            };

            const handleEditRecipe = (recipe) => {
                setRecipeName(recipe.name); 
                setRecipeCategory(recipe.category || RECIPE_CATEGORIES[0]);
                setRecipeYieldQty(recipe.yieldQty || '');
                setRecipeYieldUnit(recipe.yieldUnit || 'ml');
                setRecipeInstructions(recipe.instructions);
                setRecipeCart(recipe.ingredients); 
                setEditingRecipeId(recipe.id); 
                setIsBuildingRecipe(true);
            };

            const handleSaveRecipe = () => {
                if(!recipeName.trim()) return alert("Recipe needs a name.");
                if(recipeCart.length === 0) return alert("Add at least one ingredient.");
                if(recipeCategory === 'Batch Prep' && (!recipeYieldQty || Number(recipeYieldQty) <= 0)) return alert("Batch Preps require a total Yield Quantity.");
                
                const recipeData = { 
                    name: recipeName.trim(), category: recipeCategory,
                    yieldQty: recipeCategory === 'Batch Prep' ? Number(recipeYieldQty) : null,
                    yieldUnit: recipeCategory === 'Batch Prep' ? recipeYieldUnit : null,
                    instructions: recipeInstructions.trim(), ingredients: recipeCart, 
                    date: new Date().toLocaleDateString('en-GB') 
                };

                if (editingRecipeId) {
                    db.collection('recipes').doc(editingRecipeId).update(recipeData);
                    alert("Recipe updated!");
                } else {
                    const recipeId = 'REC-' + Date.now();
                    recipeData.id = recipeId;
                    db.collection('recipes').doc(recipeId).set(recipeData);
                }
                
                setIsBuildingRecipe(false); setEditingRecipeId(null);
                setRecipeName(''); setRecipeInstructions(''); setRecipeCart([]); setRecipeCategory(RECIPE_CATEGORIES[0]); setRecipeYieldQty('');
            };

            const deleteRecipe = (id) => { if(window.confirm("Permanently delete this recipe?")) db.collection('recipes').doc(id).delete(); };

            const openRecAdd = (item, isCustom = false) => {
                if (recipeCart.find(i => i.name === item)) return alert("Ingredient already added.");
                setRecModalItem(item); setRecModalQty(''); setRecModalUnit(isCustom ? 'ml' : 'gms'); 
                setIsCustomRecItem(isCustom); setShowRecAdd(true);
            };
            
            const openCustomRecAdd = () => {
                setRecModalItem(''); setRecModalQty(''); setRecModalUnit('ml'); 
                setIsCustomRecItem(true); setShowRecAdd(true);
            };

            const confirmRecAdd = () => {
                if(isCustomRecItem && !recModalItem.trim()) return alert("Please name the custom ingredient.");
                if(!recModalQty || Number(recModalQty) <= 0) return alert("Valid quantity needed.");
                setRecipeCart([...recipeCart, { name: recModalItem, qty: Number(recModalQty), unit: recModalUnit, isCustom: isCustomRecItem }]);
                setShowRecAdd(false);
            };

            const handleAddInventoryItem = () => {
                const newItem = window.prompt(`Enter new item name for ${dbCategory}:`);
                if (newItem && newItem.trim() !== '') {
                    const newInv = { ...inventory };
                    newInv[dbCategory] = [...newInv[dbCategory], newItem.trim()].sort();
                    db.collection('settings').doc('main').update({ inventory: newInv });
                }
            };
            const handleEditInventoryItem = (oldName) => {
                const newName = window.prompt(`Edit item name:`, oldName);
                if (newName && newName.trim() !== '' && newName !== oldName) {
                    const newInv = { ...inventory };
                    newInv[dbCategory] = newInv[dbCategory].map(item => item === oldName ? newName.trim() : item).sort();
                    db.collection('settings').doc('main').update({ inventory: newInv });
                }
            };
            const handleDeleteInventoryItem = (name) => {
                if(window.confirm(`Are you sure you want to delete "${name}" from ${dbCategory}?`)){
                    const newInv = { ...inventory };
                    newInv[dbCategory] = newInv[dbCategory].filter(item => item !== name);
                    db.collection('settings').doc('main').update({ inventory: newInv });
                }
            };

            const handleEditPrepItem = (prep) => {
                setPrepName(prep.name);
                setPrepYieldQty(prep.yieldQty);
                setPrepYieldUnit(prep.yieldUnit);
                setPrepRawQty(prep.rawQty);
                setPrepRawUnit(prep.rawUnit);
                setPrepRawItem(prep.rawItem);
                setEditingPrepId(prep.id);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const cancelEditPrep = () => {
                setPrepName(''); setPrepYieldQty(''); setPrepRawQty(''); setPrepRawItem('');
                setEditingPrepId(null);
            };

            const handleSavePrepItem = () => {
                if (!prepName || !prepYieldQty || !prepRawItem || !prepRawQty) return alert("Fill all conversion fields.");
                
                const prepData = {
                    name: prepName.trim(), 
                    yieldQty: Number(prepYieldQty), 
                    yieldUnit: prepYieldUnit,
                    rawItem: prepRawItem, 
                    rawQty: Number(prepRawQty), 
                    rawUnit: prepRawUnit
                };

                let updatedPreps;
                if (editingPrepId) {
                    updatedPreps = prepItems.map(p => p.id === editingPrepId ? { ...prepData, id: editingPrepId } : p);
                } else {
                    prepData.id = 'PREP-' + Date.now();
                    updatedPreps = [...prepItems, prepData];
                }
                
                db.collection('settings').doc('main').update({ prepItems: updatedPreps });
                
                setPrepName(''); setPrepYieldQty(''); setPrepRawQty(''); setPrepRawItem('');
                setEditingPrepId(null);
            };

            const handleDeletePrepItem = (id) => {
                if(window.confirm(`Delete this conversion rule?`)){
                    const updatedPreps = prepItems.filter(p => p.id !== id);
                    db.collection('settings').doc('main').update({ prepItems: updatedPreps });
                }
            };

            const savePriceItem = (itemName) => {
                const newPrices = { ...prices };
                newPrices[itemName] = { price: Number(tempPriceVal) || 0, unit: tempPriceUnit };
                db.collection('settings').doc('main').update({ prices: newPrices });
                setEditingPriceItem(null);
            };

            const allRawNames = Object.values(inventory).flat();
            const allBasicPreps = prepItems.map(p => p.name);
            const allBatchPreps = recipes.filter(r => r.category === 'Batch Prep').map(r => r.name);
            const allRecipeIngredients = [...allBatchPreps, ...allBasicPreps, ...allRawNames]; 

            const displayedRecipes = recipes.filter(r => {
                const matchesSearch = r.name.toLowerCase().includes(recipeSearchFilter.toLowerCase());
                const matchesCat = activeRecipeTab === 'All' || (r.category || 'Beverages') === activeRecipeTab;
                return matchesSearch && matchesCat;
            });

            return (
                <div className="animate-fade-in relative">
                    <div className="flex mb-8 border-b-2 border-victorian/20 overflow-x-auto hide-scrollbar lg:hidden">
                        {['orders', 'recipes', 'conversions', 'databases'].map(tab => (
                            <button key={tab} onClick={() => setOwnerTab(tab)} className={`w-1/4 py-3 font-bold text-[10px] sm:text-xs uppercase tracking-widest text-center whitespace-nowrap transition-all ${ownerTab === tab ? 'border-b-2 border-victorian text-victorian -mb-[2px]' : 'text-victorian/50 hover:text-victorian/80'}`}>
                                {tab === 'databases' ? 'DB' : tab}
                            </button>
                        ))}
                    </div>

                    {/* OWNER TAB: ORDERS */}
                    {ownerTab === 'orders' && (
                        <div className="animate-fade-in mb-20 lg:grid lg:grid-cols-2 lg:gap-6">
                            
                            <div className="lg:col-span-1">
                                <h3 className="text-xs font-bold uppercase tracking-widest text-victorian/70 mb-4 border-b border-victorian/10 pb-2 shadow-sm bg-white/30 backdrop-blur-sm inline-block px-2 rounded">Pending Staff Requests</h3>
                                {requests.length === 0 ? <div className="bg-white/85 backdrop-blur-md p-8 rounded-sm text-center border border-white/50 shadow-elegant text-victorian/60 italic text-sm mb-10">All caught up. No pending requests.</div> : 
                                    requests.map(req => (
                                        <div key={req.id} className="bg-white/85 backdrop-blur-md rounded-sm shadow-elegant border border-white/60 mb-8 overflow-hidden">
                                            <div className="bg-paper/90 px-5 py-3 flex justify-between items-center border-b border-victorian/10">
                                                <span className="font-serif font-bold text-victorian text-lg">{req.id}</span>
                                                <span className="text-[10px] text-gray-500 font-bold uppercase tracking-widest">{req.date}</span>
                                            </div>
                                            <div className="p-2">
                                                {req.items.map((item, idx) => {
                                                    const isChecked = selectedItems.some(i => i.reqId === req.id && i.itemIndex === idx);
                                                    return (
                                                        <div key={idx} className={`flex items-center justify-between border-b border-victorian/5 py-3 px-3 last:border-0 transition-colors ${isChecked ? 'bg-victorian/5' : 'hover:bg-white'}`}>
                                                            <label className="flex items-center space-x-4 cursor-pointer w-[85%]">
                                                                <input type="checkbox" checked={isChecked} onChange={() => handleCheck(req.id, idx, item)} className="w-5 h-5 text-victorian rounded-sm border-gray-300 focus:ring-victorian" />
                                                                <div className="flex flex-col">
                                                                    <span className="text-sm font-semibold text-victorian/90 leading-tight">{item.name}</span>
                                                                    <span className="text-xs text-antique font-bold mt-0.5">{item.qty} {item.unit}</span>
                                                                </div>
                                                            </label>
                                                            <button onClick={() => onRemoveRequestItem(req.id, idx)} className="text-gray-400 hover:text-danger text-[10px] font-bold px-3 py-2 rounded-sm transition-colors uppercase tracking-wider">Del</button>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))
                                }
                            </div>

                            <div className="lg:col-span-1">
                                <h3 className="text-xs font-bold uppercase tracking-widest text-victorian/70 mb-4 border-b border-victorian/10 pb-2 shadow-sm bg-white/30 backdrop-blur-sm inline-block px-2 rounded">Active / In-Transit POs</h3>
                                {activePOs.length === 0 ? <div className="bg-white/85 backdrop-blur-md p-6 rounded-sm text-center shadow-elegant border border-white/50 text-victorian/60 italic text-sm mb-10">No active orders en route.</div> : 
                                    activePOs.map(po => (
                                        <div key={po.id} className="bg-white/90 backdrop-blur-md p-5 rounded-sm shadow-elegant mb-4 border-l-4 border-l-antique transition-colors">
                                            <div className="flex justify-between items-start">
                                                <div className="flex-1 cursor-pointer" onClick={() => togglePO(po.id)}>
                                                    <p className="font-serif font-bold text-lg text-victorian leading-tight drop-shadow-sm flex items-center">
                                                        <span className="text-xs text-antique mr-2">{expandedPOs[po.id] ? '▼' : '▶'}</span> {po.id}
                                                    </p>
                                                    <p className="text-xs text-gray-600 mt-1 font-medium ml-4">{po.supplier}</p>
                                                </div>
                                                
                                                <div className="flex flex-col items-end space-y-3">
                                                    <span className="text-[9px] px-2.5 py-1 rounded-sm font-bold uppercase tracking-widest shadow-sm bg-antiqueLight text-victorian">
                                                        {po.status}
                                                    </span>
                                                    <div className="flex space-x-3">
                                                        <button onClick={(e) => { e.stopPropagation(); onResend(po); }} className="text-gray-500 hover:text-victorian transition-colors text-lg leading-none" title="Resend PO">🔁</button>
                                                        <button onClick={(e) => { e.stopPropagation(); onDelete(po.id); }} className="text-gray-400 hover:text-danger transition-colors text-lg leading-none" title="Delete PO">🗑️</button>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            {expandedPOs[po.id] && (
                                                <div className="animate-fade-in mt-4 pt-4 border-t border-victorian/10">
                                                    <p className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Requested Items</p>
                                                    <ul className="text-xs space-y-2">
                                                        {po.items.map((item, idx) => (
                                                            <li key={idx} className="flex justify-between text-gray-700 border-b border-gray-100 pb-1 last:border-0">
                                                                <span>{item.name}</span>
                                                                <span className="font-bold text-victorian">{item.qty} {item.unit}</span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            )}
                                        </div>
                                    ))
                                }
